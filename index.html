
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Ôn Thi">
<meta name="theme-color" content="#16a085">
<link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ôn Thi Phục Hồi Chức Năng</title>
    <style>
        :root {
            --primary: #8e44ad;
            --secondary: #2c3e50;
            --success: #27ae60;
            --info: #f39c12;
            --bg: #ecf0f1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            
            /* CHẶN BÔI ĐEN COPY THEO YÊU CẦU */
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 20px;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 1.4rem; letter-spacing: 1px;}
        .progress-bar {
            height: 10px;
            background: #bdc3c7;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s;
        }
        .question-section { flex-grow: 1; }
        .question-text {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--secondary);
            line-height: 1.4;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1.4;
            font-size: 1.05rem;
            background-color: #fff;
        }
        .option:hover { background: #f0f0f0; }
        .option.correct { background: #d4edda; border-color: #28a745; color: #155724; font-weight: bold; }
        .option.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        
        /* PHẦN GIẢI THÍCH */
        #explanation-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #fff8e1;
            border-left: 5px solid var(--info);
            border-radius: 5px;
            font-size: 1rem;
            color: #b9770e;
            line-height: 1.5;
            animation: fadeIn 0.5s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .footer-nav {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: var(--secondary);
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover { background: #6c3483; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #score-display { font-weight: bold; color: var(--primary); font-size: 1.1rem;}
        #result-screen { display: none; text-align: center; flex-grow: 1; }
        
        .jump-container { margin-top: 15px; text-align: center; font-weight: bold;}
        .jump-container select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; width: 60%;}
        
        .creator-badge {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 2px dashed #ecf0f1;
            font-size: 0.95rem;
            color: #7f8c8d;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="quiz-screen">
            <header>
                <h1>ÔN THI PHỤC HỒI CHỨC NĂNG</h1>
            </header>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div class="footer-nav">
                <span id="question-count" style="font-weight: bold; color: #555;">Câu 1 / --</span>
                <span id="score-display">Đúng: 0</span>
            </div>
            
            <div class="jump-container">
                <select id="jump-select" onchange="jumpToQuestion()"></select>
            </div>
            <hr style="border: 0; height: 1px; background: #eee; margin: 20px 0;">
            
            <div class="question-section">
                <div id="q-text" class="question-text">Đang tải...</div>
                <div id="options-list" class="options"></div>
                <!-- Div hiển thị giải thích -->
                <div id="explanation-box"></div>
            </div>
            <div class="footer-nav" style="justify-content: center; margin-top: 30px;">
                <button id="next-btn" onclick="nextQuestion()" disabled style="width: 100%;">Câu tiếp theo &rarr;</button>
            </div>
        </div>

        <div id="result-screen">
            <h2 style="color: var(--primary); margin-top: 40px;">Hoàn Thành Bài Thi!</h2>
            <div style="font-size: 4rem; margin: 20px 0; color: var(--success); font-weight: 800;" id="final-result"></div>
            <p id="feedback" style="font-size: 1.2rem; color: #555; margin-bottom: 30px;"></p>
            <button onclick="location.reload()" style="background: var(--primary); width: 100%; padding: 15px;">Làm lại từ đầu</button>
        </div>
        
        <div class="creator-badge">
            © @THDieu
        </div>
    </div>

    <script>
        // CHẶN CHUỘT PHẢI VÀ PHÍM TẮT COPY
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('copy', event => event.preventDefault());
        document.addEventListener('cut', event => event.preventDefault());
        document.addEventListener('paste', event => event.preventDefault());

        const quizData = [{"q": "Câu 1: Theo WHO (1948), định nghĩa nào sau đây đúng nhất về \"Sức khỏe\"?", "a": ["A. Là tình trạng không có bệnh tật hoặc thương tật.", "B. Là tình trạng sảng khoái toàn diện về thể chất và tinh thần.", "C. Là trạng thái thoải mái toàn diện về thể chất, tinh thần và xã hội chứ không chỉ là không có bệnh hay thương tật.", "D. Là khả năng lao động và cống hiến cho xã hội."], "c": 2, "e": "Đây là định nghĩa kinh điển của Tổ chức Y tế Thế giới (WHO) nhấn mạnh 3 khía cạnh: thể chất, tinh thần và xã hội."}, {"q": "Câu 2: Trình tự nào sau đây phản ánh đúng \"Quá trình tàn tật\" theo phân loại ICIDH của WHO?", "a": ["A. Bệnh/Tổn thương -> Giảm khả năng -> Khiếm khuyết -> Tàn tật", "B. Bệnh/Tổn thương -> Khiếm khuyết -> Giảm khả năng -> Tàn tật", "C. Khiếm khuyết -> Bệnh -> Tàn tật -> Giảm khả năng", "D. Bệnh -> Tàn tật -> Khiếm khuyết -> Giảm khả năng"], "c": 1, "e": "Bệnh gây ra sự bất thường cấu trúc (Khiếm khuyết), dẫn đến hạn chế hoạt động (Giảm khả năng), và cuối cùng là bất lợi xã hội (Tàn tật)."}, {"q": "Câu 3: Thuật ngữ \"Khiếm khuyết\" (Impairment) được định nghĩa là gì?", "a": ["A. Sự hạn chế hay thiếu sót khả năng thực hiện một hoạt động bình thường.", "B. Sự mất mát hoặc bất thường của một cấu trúc hay chức năng tâm lý, sinh lý, giải phẫu.", "C. Sự bất lợi của cá nhân do không tham gia được vào các hoạt động xã hội.", "D. Tình trạng mắc một bệnh lý mạn tính."], "c": 1, "e": "Khiếm khuyết là tổn thương ở mức độ cơ quan/hệ thống cơ thể (VD: cụt chân, đục thủy tinh thể)."}, {"q": "Câu 4: Thuật ngữ \"Giảm khả năng\" (Disability) chỉ tình trạng nào?", "a": ["A. Sự mất mát một phần cơ thể.", "B. Hạn chế thực hiện các chức năng, hoạt động sinh hoạt ở mức độ cá nhân.", "C. Không tìm được việc làm do định kiến xã hội.", "D. Mắc bệnh tâm thần."], "c": 1, "e": "Giảm khả năng là hậu quả của khiếm khuyết ở mức độ cá nhân (VD: cụt chân dẫn đến không đi lại được)."}, {"q": "Câu 5: \"Tàn tật\" (Handicap) là khái niệm đánh giá sự bất lợi ở mức độ nào?", "a": ["A. Tế bào", "B. Cơ quan", "C. Cá nhân", "D. Xã hội"], "c": 3, "e": "Tàn tật là sự bất lợi ở mức độ xã hội, khi cá nhân không thể thực hiện vai trò của mình (VD: không đi học, không có việc làm)."}, {"q": "Câu 6: Có mấy hình thức Phục hồi chức năng (PHCN) cơ bản hiện nay?", "a": ["A. 2 hình thức (tại bệnh viện, tại cộng đồng)", "B. 3 hình thức (tại viện, tại nhà, dựa vào cộng đồng)", "C. 4 hình thức", "D. 5 hình thức"], "c": 1, "e": "3 hình thức chính bao gồm: PHCN tại trung tâm/bệnh viện, PHCN tại nhà, và PHCN dựa vào cộng đồng (CBR)."}, {"q": "Câu 7: Hình thức PHCN nào có tỷ lệ bao phủ người khuyết tật cao nhất và chi phí thấp nhất?", "a": ["A. PHCN tại bệnh viện tuyến trung ương", "B. PHCN tại các Viện điều dưỡng", "C. PHCN dựa vào cộng đồng (CBR)", "D. PHCN tại phòng khám tư nhân"], "c": 2, "e": "CBR huy động nguồn lực gia đình và xã hội tại chỗ, giúp tiết kiệm chi phí và tiếp cận được số đông người khuyết tật."}, {"q": "Câu 8: Nhược điểm lớn nhất của hình thức PHCN tại bệnh viện/trung tâm là gì?", "a": ["A. Thiếu trang thiết bị hiện đại.", "B. Thiếu cán bộ chuyên môn cao.", "C. Giá thành cao, người bệnh ở xa khó tiếp cận và khó hòa nhập môi trường thực tế.", "D. Không giải quyết được các ca bệnh khó."], "c": 2, "e": "Bệnh viện tốn kém và môi trường nhân tạo không phản ánh đúng điều kiện sinh hoạt thực tế tại nhà bệnh nhân."}, {"q": "Câu 9: Nhóm phương pháp nào sau đây thuộc chuyên ngành Phục hồi chức năng?", "a": ["A. Phẫu thuật, hóa trị, xạ trị.", "B. Vật lý trị liệu, Hoạt động trị liệu, Ngôn ngữ trị liệu, Tâm lý trị liệu.", "C. Châm cứu, bấm huyệt, bốc thuốc nam.", "D. Tiêm phòng, cách ly, vệ sinh dịch tễ."], "c": 1, "e": "Đây là các mảng chuyên môn cốt lõi của đội ngũ đa ngành trong PHCN."}, {"q": "Câu 10: Phòng ngừa tàn tật Cấp 1 (Primary prevention) nhằm mục đích gì?", "a": ["A. Ngăn ngừa bệnh tật hoặc tổn thương xảy ra.", "B. Ngăn ngừa khiếm khuyết tiến triển thành giảm khả năng.", "C. Ngăn ngừa giảm khả năng trở thành tàn tật.", "D. Cung cấp xe lăn cho người bệnh."], "c": 0, "e": "Cấp 1 là phòng bệnh (VD: tiêm chủng, đội mũ bảo hiểm) để không bị bệnh/tai nạn."}, {"q": "Câu 11: Khám phát hiện sớm và điều trị tích cực bệnh phong, bại liệt thuộc bước phòng ngừa nào?", "a": ["A. Cấp 1", "B. Cấp 2", "C. Cấp 3", "D. Cấp 4"], "c": 1, "e": "Cấp 2 là phát hiện và can thiệp sớm khi đã có bệnh/tổn thương để chúng không để lại Khiếm khuyết."}, {"q": "Câu 12: Cung cấp dụng cụ trợ giúp (xe lăn, chân giả) thuộc bước phòng ngừa tàn tật cấp độ mấy?", "a": ["A. Cấp 1", "B. Cấp 2", "C. Cấp 3", "D. Cấp 0"], "c": 2, "e": "Cấp 3 nhằm giúp người đã bị khiếm khuyết/giảm khả năng vượt qua rào cản để không bị \"Tàn tật\" (bất lợi xã hội)."}, {"q": "Câu 13: Vật lý trị liệu (Physical therapy) chủ yếu sử dụng các tác nhân nào?", "a": ["A. Các loại thuốc hóa học.", "B. Các tác nhân vật lý (Nhiệt, điện, ánh sáng, nước) và Vận động.", "C. Can thiệp bằng dao kéo.", "D. Trò chuyện và ám thị."], "c": 1, "e": "PT sử dụng lực cơ học, nhiệt, điện... để giảm đau, chống viêm và phục hồi vận động."}, {"q": "Câu 14: Hoạt động trị liệu (Occupational therapy) tập trung vào mục tiêu gì?", "a": ["A. Kéo dãn cột sống.", "B. Phục hồi khả năng thực hiện các Hoạt động sống hàng ngày (ADL) và công việc.", "C. Chữa chứng nói đớ.", "D. Giảm đau cấp tính."], "c": 1, "e": "OT hướng tới sự độc lập trong sinh hoạt cá nhân (tự ăn, tự mặc áo) và khả năng làm việc của bàn tay."}, {"q": "Câu 15: Ai là người đóng vai trò nòng cốt trong PHCN dựa vào cộng đồng?", "a": ["A. Bác sĩ tuyến trung ương.", "B. Bản thân người khuyết tật và gia đình của họ.", "C. Tổ chức y tế thế giới.", "D. Kỹ thuật viên vật lý trị liệu."], "c": 1, "e": "Trong CBR, sự tham gia chủ động của người bệnh và người nhà quyết định sự thành công và duy trì bền vững."}, {"q": "Câu 16: Một thanh niên bị tai nạn giao thông dẫn đến cắt cụt 1/3 dưới đùi phải. Việc \"bị cắt cụt chân\" tương ứng với khái niệm nào trong ICIDH?", "a": ["A. Bệnh tật", "B. Khiếm khuyết", "C. Giảm khả năng", "D. Tàn tật"], "c": 1, "e": "Mất đi cấu trúc giải phẫu (mất chân) là Khiếm khuyết."}, {"q": "Câu 17: Thanh niên trên do mất chân nên không thể tự đi bộ đến trường. Tình trạng \"không thể tự đi lại\" tương ứng với:", "a": ["A. Khiếm khuyết", "B. Giảm khả năng", "C. Tàn tật", "D. Bệnh tật"], "c": 1, "e": "Hạn chế hoạt động cá nhân (đi bộ) là Giảm khả năng."}, {"q": "Câu 18: Nhà trường từ chối nhận thanh niên này vào học vì trường không có đường dốc cho xe lăn. Đây là ví dụ của:", "a": ["A. Khiếm khuyết", "B. Giảm khả năng", "C. Tàn tật (Bất lợi xã hội)", "D. Phòng bệnh cấp 1"], "c": 2, "e": "Không được đi học là sự cản trở hòa nhập xã hội, đây chính là \"Tàn tật\" (Handicap)."}, {"q": "Câu 19: Mục tiêu chính của Tâm lý trị liệu trong PHCN là gì?", "a": ["A. Tăng cường sức mạnh cơ bắp.", "B. Giúp người bệnh chấp nhận thực trạng, vượt qua khủng hoảng tâm lý và có thái độ sống tích cực.", "C. Hướng dẫn bệnh nhân cách tự mặc áo.", "D. Phát âm rõ tiếng."], "c": 1, "e": "Người khuyết tật thường bị sốc, trầm cảm. Tâm lý trị liệu giúp họ giải tỏa và lấy lại nghị lực."}, {"q": "Câu 20: Việc hướng dẫn phụ nữ mang thai uống bổ sung Acid Folic để phòng ngừa dị tật ống thần kinh cho thai nhi là phòng ngừa cấp mấy?", "a": ["A. Cấp 1", "B. Cấp 2", "C. Cấp 3", "D. Không thuộc các cấp này"], "c": 0, "e": "Đây là biện pháp nhằm loại bỏ hoàn toàn khả năng xảy ra tổn thương ban đầu."}, {"q": "Câu 21: Theo thống kê, nhóm tuổi nào có nhu cầu cần PHCN cao nhất?", "a": ["A. Dưới 5 tuổi", "B. Từ 15 - 24 tuổi", "C. Thanh niên", "D. Nhóm trung niên và cao tuổi (50 - 59 tuổi trở lên)"], "c": 3, "e": "Quá trình lão hóa đi kèm với các bệnh lý mạn tính (đột quỵ, thoái hóa khớp) làm tăng đột biến nhu cầu PHCN."}, {"q": "Câu 22: Quan điểm mới về PHCN dựa vào cộng đồng (CBR) hiện nay được mở rộng như thế nào?", "a": ["A. Chỉ tập trung vào y tế.", "B. Phát triển thành chiến lược phát triển cộng đồng bao trùm: Y tế, Giáo dục, Sinh kế, Xã hội và Trao quyền.", "C. Từ bỏ hoàn toàn y tế tuyến xã.", "D. Chuyển hết bệnh nhân về nhà tự chữa."], "c": 1, "e": "Ma trận CBR của WHO hiện nay bao phủ toàn diện để giúp người khuyết tật hòa nhập mọi mặt đời sống."}, {"q": "Câu 23: Cung cấp vốn vay ưu đãi để người khuyết tật mở tiệm tạp hóa thuộc thành tố nào của ma trận CBR?", "a": ["A. Y tế", "B. Giáo dục", "C. Sinh kế", "D. Trao quyền"], "c": 2, "e": "Sinh kế (Livelihood) giúp người khuyết tật có thu nhập và độc lập về mặt tài chính."}, {"q": "Câu 24: Hoạt động nào sau đây thuộc lĩnh vực Ngôn ngữ trị liệu (Speech therapy)?", "a": ["A. Tập nuốt cho bệnh nhân bị sặc sau đột quỵ.", "B. Cung cấp máy trợ thính.", "C. Phẫu thuật vá khe hở hàm ếch.", "D. Đo thính lực."], "c": 0, "e": "Ngôn ngữ trị liệu điều trị các rối loạn về phát âm, ngôn ngữ và cả rối loạn nuốt (Dysphagia)."}, {"q": "Câu 25: Nhược điểm của PHCN tại nhà là gì?", "a": ["A. Bệnh nhân không được ở gần gia đình.", "B. Không thích ứng được với điều kiện sinh hoạt.", "C. Thiếu cán bộ, thiếu phương tiện và không thể thực hiện đồng loạt cho nhiều người.", "D. Chi phí quá đắt đỏ."], "c": 2, "e": "Cán bộ y tế phải di chuyển nhiều, không có máy móc hỗ trợ, dẫn đến hiệu suất thấp."}, {"q": "Câu 26: Khám tầm soát đục thủy tinh thể định kỳ cho người già để mổ thay thủy tinh thể sớm nhằm phục hồi thị lực thuộc:", "a": ["A. Phòng ngừa cấp 1", "B. Phòng ngừa cấp 2", "C. Phòng ngừa cấp 3", "D. Quá trình tàn tật"], "c": 1, "e": "Bệnh đã xuất hiện (đục TTT), mổ sớm giúp ngăn chặn tiến triển thành Giảm khả năng (mù lòa)."}, {"q": "Câu 27: Một trong những yếu tố xã hội đóng vai trò là \"rào cản\" biến Giảm khả năng thành Tàn tật là?", "a": ["A. Người bệnh được cung cấp xe lăn.", "B. Thái độ kỳ thị, phân biệt đối xử của cộng đồng.", "C. Gia đình yêu thương chăm sóc.", "D. Sự phát triển của mạng internet."], "c": 1, "e": "Tàn tật sinh ra phần lớn do môi trường và thái độ xã hội không chấp nhận người khuyết tật."}, {"q": "Câu 28: Chăm sóc sức khỏe ban đầu (Primary Health Care - PHC) có bao nhiêu nội dung cốt lõi theo Tuyên ngôn Alma-Ata?", "a": ["A. 4 nội dung", "B. 6 nội dung", "C. 8 nội dung", "D. 10 nội dung"], "c": 2, "e": "Tuyên ngôn Alma-Ata (1978) quy định 8 nội dung thiết yếu của CSSKBĐ (GDSK, Dinh dưỡng, Nước sạch, SKSS, Tiêm chủng, Bệnh lưu hành, Bệnh thông thường, Thuốc thiết yếu)."}, {"q": "Câu 29: Định nghĩa Khuyết tật theo Luật Người khuyết tật Việt Nam nhấn mạnh sự suy giảm chức năng dẫn đến điều gì?", "a": ["A. Phải nằm viện suốt đời.", "B. Mất đi một phần cơ thể.", "C. Gặp khó khăn trong sinh hoạt, lao động, học tập và tham gia các hoạt động xã hội.", "D. Cần được trợ cấp tiền bạc."], "c": 2, "e": "Luật pháp chú trọng vào rào cản sinh hoạt và hòa nhập xã hội do khiếm khuyết gây ra."}, {"q": "Câu 30: \"Giáo dục hòa nhập\" (Inclusive education) cho trẻ khuyết tật mang ý nghĩa gì?", "a": ["A. Xây dựng các trường học biệt lập chỉ dành riêng cho trẻ mù, điếc.", "B. Trẻ khuyết tật được học chung với trẻ em bình thường tại các trường phổ thông với sự hỗ trợ phù hợp.", "C. Trẻ tự học ở nhà qua internet.", "D. Trẻ không cần đi học."], "c": 1, "e": "Giáo dục hòa nhập là chiến lược cốt lõi của CBR giúp xóa bỏ kỳ thị ngay từ lứa tuổi học đường."}, {"q": "Câu 31: Mô hình ICF (International Classification of Functioning, Disability and Health - 2001) của WHO có sự thay đổi triết lý gì so với mô hình ICIDH (1980) cũ?", "a": ["A. ICF chỉ tập trung vào bệnh lý và y khoa.", "B. ICF chuyển từ góc nhìn \"hậu quả bệnh tật\" sang góc nhìn \"tình trạng sức khỏe và chức năng\", nhấn mạnh sự tương tác với yếu tố Môi trường và Cá nhân.", "C. ICF loại bỏ hoàn toàn khái niệm tàn tật.", "D. ICF áp dụng riêng cho người bị bệnh tâm thần."], "c": 1, "e": "ICF mang tính tích cực hơn, khẳng định khuyết tật là kết quả của sự tương tác giữa tình trạng sức khỏe và rào cản môi trường/xã hội."}, {"q": "Câu 32: Trong ICF, thuật ngữ nào thay thế cho \"Tàn tật\" (Handicap) của ICIDH cũ để mang ý nghĩa tích cực hơn?", "a": ["A. Cấu trúc cơ thể (Body Structures)", "B. Hoạt động (Activity)", "C. Sự tham gia (Participation)", "D. Yếu tố cá nhân (Personal Factors)"], "c": 2, "e": "\"Hạn chế sự tham gia\" (Participation restriction) được dùng thay cho Tàn tật, chỉ sự khó khăn khi tham gia vào các tình huống đời sống."}, {"q": "Câu 33: Hoạt động nào sau đây thể hiện rõ nhất nguyên lý \"Trao quyền\" (Empowerment) trong PHCN dựa vào cộng đồng?", "a": ["A. Bác sĩ quyết định mọi phác đồ cho bệnh nhân.", "B. Phát thẻ bảo hiểm y tế miễn phí.", "C. Hỗ trợ thành lập các Hội/Nhóm tự lực của Người khuyết tật để họ tự lên tiếng bảo vệ quyền lợi của mình.", "D. Xây thêm bệnh viện tuyến huyện."], "c": 2, "e": "Trao quyền là cung cấp tiếng nói và năng lực chính trị, xã hội để chính người khuyết tật làm chủ cuộc đời họ."}, {"q": "Câu 34: Sự khác biệt giữa \"Vật lý trị liệu\" và \"Hoạt động trị liệu\" trong điều trị liệt nửa người là gì?", "a": ["A. Không có sự khác biệt.", "B. Vật lý trị liệu tập trung phục hồi tầm vận động khớp, sức mạnh cơ bắp và dáng đi; Hoạt động trị liệu tập trung dùng bàn tay liệt để cầm thìa, mặc áo, chải đầu.", "C. VLTL dùng thuốc, HĐTL không dùng thuốc.", "D. HĐTL chỉ dùng cho người bệnh tâm thần."], "c": 1, "e": "PT thiên về phục hồi cấu trúc cơ sinh học, OT ứng dụng các cấu trúc đó vào hoạt động chức năng có ý nghĩa sinh tồn."}, {"q": "Câu 35: Tại sao mô hình PHCN dựa vào cộng đồng (CBR) được WHO khuyến cáo là chiến lược chính ở các nước đang phát triển?", "a": ["A. Vì các nước này không có bệnh viện.", "B. Vì người dân không thích bác sĩ.", "C. Phù hợp với nguồn lực kinh tế hạn hẹp, tận dụng mạng lưới y tế cơ sở và gia đình, mang lại độ bao phủ cao.", "D. Vì kỹ thuật này dễ tự làm không cần học."], "c": 2, "e": "CBR giải quyết bài toán kinh tế y tế (cost-effectiveness), giúp 80% người khuyết tật ở nông thôn, vùng sâu tiếp cận được dịch vụ."}, {"q": "Câu 36: Trong Đạo luật Người khuyết tật, \"Khả năng tiếp cận\" (Accessibility) công trình công cộng yêu cầu điều gì?", "a": ["A. Xây dựng đường dốc cho xe lăn, nhà vệ sinh rộng, chữ nổi trong thang máy, tín hiệu âm thanh ở đèn đỏ.", "B. Chỉ cần có người bế họ lên bậc thang.", "C. Miễn vé vào cổng cho người khuyết tật.", "D. Xây các khu nhà riêng biệt cho họ."], "c": 0, "e": "Thiết kế phổ quát (Universal design) là bắt buộc để dỡ bỏ rào cản vật lý, biến môi trường trở nên thân thiện với mọi đối tượng."}, {"q": "Câu 37: Âm nhạc trị liệu (Music therapy) thường được ứng dụng mang lại hiệu quả cao nhất cho nhóm bệnh nhân nào?", "a": ["A. Gãy xương đùi.", "B. Tự kỷ ở trẻ em, trầm cảm, hoặc rối loạn ngôn ngữ sau đột quỵ.", "C. Bỏng diện rộng.", "D. Sỏi thận."], "c": 1, "e": "Âm nhạc kích thích mạnh mẽ vỏ não cảm xúc và vùng ngôn ngữ, giúp trẻ tự kỷ mở lòng và bệnh nhân đột quỵ tập phát âm qua bài hát."}, {"q": "Câu 38: Nguyên tắc \"Can thiệp sớm\" trong PHCN mang lại lợi ích gì đặc biệt cho trẻ bại não?", "a": ["A. Làm trẻ cao nhanh hơn.", "B. Tận dụng giai đoạn \"cửa sổ vàng\" của sự dẻo dai thần kinh (neuroplasticity) ở não trẻ dưới 3 tuổi để tái tổ chức các nơ-ron, mang lại hiệu quả phục hồi tối đa.", "C. Tiết kiệm tiền mua sữa.", "D. Chữa khỏi hoàn toàn 100%."], "c": 1, "e": "Não bộ trẻ em có tính mềm dẻo cao, can thiệp trước 3 tuổi giúp thiết lập các vòng nối thần kinh bù trừ cho vùng bị tổn thương."}, {"q": "Câu 39: Ứng dụng \"Nhà thông minh\" (Smart home) điều khiển bằng giọng nói cho người liệt tứ chi phản ánh yếu tố nào trong ICF?", "a": ["A. Yếu tố cá nhân", "B. Sự cải thiện Yếu tố môi trường (Environmental Factors) làm giảm thiểu khuyết tật chức năng.", "C. Chữa khỏi khiếm khuyết.", "D. Phòng bệnh cấp 1."], "c": 1, "e": "Môi trường trang bị công nghệ cao giúp người liệt hoàn toàn vẫn có thể tự bật đèn, gọi điện thoại (Tham gia vào hoạt động sống)."}, {"q": "Câu 40: \"Nhóm đa chuyên ngành\" (Multidisciplinary team) trong bệnh viện PHCN đòi hỏi cơ chế hoạt động như thế nào?", "a": ["A. Mỗi bác sĩ/kỹ thuật viên khám xong ghi y lệnh riêng rẽ, không ai liên quan ai.", "B. Có sự hội chẩn chung định kỳ giữa BS PHCN, PT, OT, ST, Điều dưỡng và Tâm lý để thống nhất MỘT mục tiêu và kế hoạch can thiệp duy nhất cho bệnh nhân.", "C. Bệnh nhân tự chọn người điều trị cho mình.", "D. Kỹ thuật viên trưởng ra quyết định cuối cùng."], "c": 1, "e": "Sự phối hợp đồng bộ giúp các can thiệp không bị chồng chéo và hỗ trợ lẫn nhau, hướng tới mục tiêu chức năng cao nhất."}, {"q": "Câu 41: Theo TCYTTG (WHO), Tai biến mạch máu não (TBMMN) được định nghĩa là thiếu sót thần kinh khu trú kéo dài quá bao lâu?", "a": ["A. Tồn tại quá 1 giờ", "B. Tồn tại quá 12 giờ", "C. Tồn tại quá 24 giờ hoặc tử vong trong 24 giờ", "D. Tồn tại quá 48 giờ"], "c": 2, "e": "Định nghĩa kinh điển của Đột quỵ đòi hỏi triệu chứng kéo dài >24h (nếu dưới 24h phục hồi hoàn toàn gọi là TIA - Cơn thiếu máu não thoáng qua)."}, {"q": "Câu 42: Yếu tố nguy cơ hàng đầu, phổ biến nhất dẫn đến TBMMN là gì?", "a": ["A. Đái tháo đường", "B. Tăng huyết áp", "C. Hút thuốc lá", "D. Rối loạn lipid máu"], "c": 1, "e": "Tăng huyết áp là yếu tố nguy cơ độc lập mạnh nhất cho cả nhồi máu và xuất huyết não."}, {"q": "Câu 43: Có hai phân loại chính của TBMMN là gì?", "a": ["A. Nhồi máu não (Thiếu máu não cục bộ) và Xuất huyết não.", "B. Vỡ phình mạch và Dị dạng mạch máu não.", "C. Co thắt mạch và Viêm mạch máu.", "D. Nhồi máu não và U não."], "c": 0, "e": "Đột quỵ được chia làm 2 loại: do tắc nghẽn mạch (Nhồi máu - chiếm khoảng 80-85%) và do vỡ mạch (Xuất huyết)."}, {"q": "Câu 44: Di chứng thường gặp nhất và cản trở chức năng lớn nhất sau TBMMN là gì?", "a": ["A. Suy thận", "B. Liệt nửa người (Hemiplegia)", "C. Rụng tóc", "D. Viêm loét dạ dày"], "c": 1, "e": "Tổn thương một bán cầu não dẫn đến mất vận động/cảm giác ở nửa người đối diện."}, {"q": "Câu 45: Mẫu co cứng điển hình ở bệnh nhân TBMMN (Mẫu Wernicke-Mann) ở tay có đặc điểm gì?", "a": ["A. Khớp vai dạng, khuỷu duỗi, các ngón tay xòe.", "B. Khớp vai khép, xoay trong, khuỷu gấp, cổ tay và các ngón tay gấp.", "C. Khớp vai nâng cao, khuỷu duỗi thẳng.", "D. Tay liệt mềm nhão hoàn toàn không thể gấp."], "c": 1, "e": "Đây là mẫu co cứng gấp ở chi trên, cánh tay áp sát thân mình, khuỷu và bàn tay co quắp trước ngực."}, {"q": "Câu 46: Mẫu co cứng điển hình ở chi dưới sau TBMMN có đặc điểm gì?", "a": ["A. Háng gấp, gối gấp, cổ chân gập mu.", "B. Háng duỗi, khép, xoay trong; Gối duỗi; Cổ chân duỗi (gập lòng), bàn chân vẹo trong.", "C. Chân dang rộng, gối khuỵu.", "D. Chân co quắp sát ngực."], "c": 1, "e": "Co cứng duỗi ở chi dưới làm chân bệnh nhân dài ra, cứng đơ, bàn chân rũ xuống khiến họ phải đi kiểu \"phạt cỏ\" (vạt tép)."}, {"q": "Câu 47: Tư thế nằm trên giường nào là TỐT NHẤT đối với bệnh nhân liệt nửa người?", "a": ["A. Nằm ngửa hoàn toàn.", "B. Nằm nghiêng sang bên lành.", "C. Nằm nghiêng sang bên liệt.", "D. Nằm sấp."], "c": 2, "e": "Nằm nghiêng bên liệt giúp tăng cảm nhận không gian (cảm giác bản thể) cho nửa người liệt và để bên lành tự do sinh hoạt."}, {"q": "Câu 48: Khi đặt bệnh nhân nằm ngửa, cánh tay bên liệt nên được kê gối như thế nào để chống mẫu co cứng?", "a": ["A. Áp sát vào thân mình, khuỷu gấp trên bụng.", "B. Vai dạng, xoay ngoài, khuỷu duỗi thẳng, bàn tay ngửa các ngón xòe.", "C. Kéo quặt tay ra sau gáy.", "D. Nằm đè lên cánh tay liệt."], "c": 1, "e": "Đây là tư thế đảo ngược hoàn toàn với mẫu co cứng Wernicke-Mann (Gấp, khép, xoay trong)."}, {"q": "Câu 49: Tại sao tư thế nằm ngửa lại KHÔNG được khuyến khích nhiều ở bệnh nhân TBMMN?", "a": ["A. Vì dễ làm gãy xương.", "B. Vì kích thích phản xạ co cứng (phản xạ trương lực cổ không đối xứng), làm tăng co cứng duỗi và tăng nguy cơ sặc/viêm phổi.", "C. Vì làm huyết áp tăng vọt.", "D. Vì bệnh nhân không thích."], "c": 1, "e": "Nằm ngửa lâu làm tăng trương lực cơ duỗi, đồng thời lưỡi tụt ra sau dễ gây sặc nước bọt/thức ăn."}, {"q": "Câu 50: Mục đích chính của việc Lăn trở bệnh nhân 2 giờ/lần trong giai đoạn cấp là gì?", "a": ["A. Tập thể dục cho bệnh nhân.", "B. Chống loét do tỳ đè và phòng ứ đọng phổi.", "C. Cho bệnh nhân dễ ngủ.", "D. Khám lưng bệnh nhân."], "c": 1, "e": "Bệnh nhân liệt nằm bất động, vùng tỳ đè (xương cùng, gót, vai) thiếu máu nuôi sẽ hoại tử thành loét rất nhanh."}, {"q": "Câu 51: Biến chứng xương khớp rất thường gặp ở khớp vai bên liệt của bệnh nhân TBMMN là gì?", "a": ["A. Thoái hóa khớp vai.", "B. Bán trật khớp vai (Subluxation) kèm đau.", "C. Gãy xương đòn.", "D. Rách gân cơ nhị đầu."], "c": 1, "e": "Giai đoạn liệt mềm, các cơ quanh vai nhão ra không giữ được chỏm xương cánh tay, làm nó trễ xuống gây bán trật và đau."}, {"q": "Câu 52: Giai đoạn phục hồi của bệnh nhân liệt nửa người thường trải qua diễn tiến trương lực cơ như thế nào?", "a": ["A. Co cứng -> Liệt mềm -> Hồi phục", "B. Liệt mềm -> Co cứng -> Tự chủ vận động", "C. Bình thường -> Co cứng -> Liệt mềm", "D. Luôn luôn liệt mềm từ đầu đến cuối"], "c": 1, "e": "Ban đầu là liệt mềm (flaccid), sau đó xuất hiện trương lực cơ (co cứng/spasticity), và cuối cùng là kiểm soát vận động tùy ý."}, {"q": "Câu 53: Kỹ thuật Vận động thụ động (Passive ROM) có ý nghĩa gì?", "a": ["A. Bệnh nhân tự dùng sức để tập.", "B. Kỹ thuật viên/người nhà thực hiện cử động khớp cho bệnh nhân để duy trì tầm vận động, phòng co rút khớp.", "C. Tập tạ tăng sức mạnh cơ.", "D. Chạy bộ trên máy."], "c": 1, "e": "Khi bệnh nhân liệt hoàn toàn, phải có người tập thụ động để các khớp không bị dính và cơ không bị co rút cứng lại."}, {"q": "Câu 54: Tổn thương bán cầu não TRÁI thường dẫn đến những khiếm khuyết nào?", "a": ["A. Liệt nửa người trái và rối loạn không gian.", "B. Liệt nửa người phải và Rối loạn ngôn ngữ (Mất ngôn ngữ - Aphasia).", "C. Không bị liệt.", "D. Mù hai mắt."], "c": 1, "e": "Do bắt chéo tháp nên liệt đối bên (liệt phải). Trung khu ngôn ngữ (Broca, Wernicke) thường nằm ở bán cầu trái."}, {"q": "Câu 55: Trong tập di chuyển, nẹp cổ bàn chân (AFO - Ankle Foot Orthosis) được sử dụng để khắc phục tình trạng gì?", "a": ["A. Đau đầu gối", "B. Bàn chân rũ (Drop foot)", "C. Lỏng khớp háng", "D. Đau thắt lưng"], "c": 1, "e": "AFO giữ cổ chân ở góc 90 độ, giúp bệnh nhân không bị vấp ngón chân xuống đất khi bước đi."}, {"q": "Câu 56: Khi hướng dẫn bệnh nhân liệt nửa người tự mặc áo có cài cúc, nguyên tắc nào sau đây là ĐÚNG?", "a": ["A. Mặc tay lành trước, cởi tay liệt trước.", "B. Mặc tay liệt trước, cởi tay lành trước.", "C. Mặc cả 2 tay cùng lúc.", "D. Mặc quần trước khi mặc áo."], "c": 1, "e": "Nguyên tắc vàng: \"Mặc yếu trước - Cởi mạnh trước\". Dùng tay lành lồng áo vào tay liệt trước, sau đó tay lành tự xỏ vào dễ dàng."}, {"q": "Câu 57: Dáng đi đặc trưng của bệnh nhân co cứng sau TBMMN gọi là \"dáng đi phạt cỏ\" (Circumduction gait). Nguyên nhân cơ sinh học do đâu?", "a": ["A. Do chân liệt ngắn hơn chân lành.", "B. Do co cứng cơ duỗi háng, gối và gập lòng cổ chân, khiến chân liệt dài ra, bệnh nhân phải vòng chân ra ngoài để bước tới.", "C. Do đau khớp háng.", "D. Do chóng mặt."], "c": 1, "e": "Chân cứng đơ như khúc gỗ và mũi chân rủ xuống. Để không vấp, họ phải nghiêng người và quăng chân liệt theo đường vòng cung."}, {"q": "Câu 58: Cấu trúc giường bệnh chuẩn cho bệnh nhân TBMMN giai đoạn cấp cần chú ý điều gì?", "a": ["A. Nệm thật lún, mềm để khỏi đau.", "B. Giường có bánh xe không khóa.", "C. Nệm phẳng, cứng vừa phải, giường có thanh chắn bảo vệ và chiều cao phù hợp để chuyển sang xe lăn.", "D. Đặt sát vào tường để bệnh nhân tựa."], "c": 2, "e": "Nệm quá mềm khiến bệnh nhân không lăn trở được và dễ cong vẹo cột sống. Thanh chắn giúp an toàn và bệnh nhân bám để tự lật người."}, {"q": "Câu 59: Vị trí của các vật dụng (tủ đầu giường, tivi, chuông gọi) nên được bố trí ở bên nào của bệnh nhân trong giai đoạn đầu?", "a": ["A. Bên liệt, để ép họ phải chú ý sang bên liệt (Khắc phục hội chứng bỏ quên nửa người - Neglect).", "B. Bên lành, để họ tự phục vụ.", "C. Đặt trên trần nhà.", "D. Giấu đi để họ tập tìm kiếm."], "c": 0, "e": "Đặt đồ vật bên liệt kích thích thị giác, thính giác và ép bệnh nhân phải hướng sự chú ý sang bên não bị tổn thương."}, {"q": "Câu 60: Đánh giá ADL (Hoạt động sống hàng ngày) ở bệnh nhân sau đột quỵ thường sử dụng thang điểm chuẩn nào?", "a": ["A. Thang điểm Glasgow", "B. Thang điểm Barthel (Barthel Index)", "C. Thang điểm ASIA", "D. Thang điểm Child-Pugh"], "c": 1, "e": "Barthel Index là thang điểm quốc tế kinh điển để chấm điểm khả năng tự độc lập trong ăn uống, tắm rửa, di chuyển."}, {"q": "Câu 61: Hội chứng \"Bỏ quên nửa người\" (Hemineglect) thường gặp trong tổn thương ở vùng não nào?", "a": ["A. Thùy trán trái", "B. Bán cầu não phải (Thùy đỉnh phải).", "C. Tiểu não", "D. Hành não"], "c": 1, "e": "Tổn thương bán cầu phải, bệnh nhân hoàn toàn không nhận thức được sự tồn tại của không gian bên trái và phần thân thể bên trái."}, {"q": "Câu 62: Chứng \"Mất ngôn ngữ Broca\" (Broca's Aphasia) có đặc điểm lâm sàng gì?", "a": ["A. Bệnh nhân nói rất nhiều, lưu loát nhưng vô nghĩa (Nói sa sả).", "B. Bệnh nhân nghe hiểu tốt, nhưng không thể diễn đạt thành lời, nói ngắc ngứ từng từ (Mất ngôn ngữ diễn đạt).", "C. Điếc hoàn toàn.", "D. Mất trí nhớ."], "c": 1, "e": "Tổn thương vùng Broca làm mất khả năng vận động phát âm, nhưng bệnh nhân vẫn tỉnh táo và hiểu người khác nói."}, {"q": "Câu 63: Chứng \"Mất ngôn ngữ Wernicke\" (Wernicke's Aphasia) có đặc điểm gì?", "a": ["A. Không nói được từ nào.", "B. Bệnh nhân nói trôi chảy, lưu loát nhưng không hiểu người khác nói gì và nội dung câu nói của họ hoàn toàn vô nghĩa (Mất ngôn ngữ tiếp nhận).", "C. Bị câm điếc bẩm sinh.", "D. Liệt dây thanh âm."], "c": 1, "e": "Vùng Wernicke là trung tâm phân tích ý nghĩa ngôn ngữ. Tổn thương làm bệnh nhân nghe tiếng người như \"nghe ngoại ngữ lạ\"."}, {"q": "Câu 64: Biện pháp PHCN nuốt cho bệnh nhân có rối loạn nuốt (Dysphagia) sau đột quỵ là gì?", "a": ["A. Cho uống thật nhiều nước lọc.", "B. Ăn thức ăn lỏng, nằm ngửa khi ăn.", "C. Ngồi tư thế thẳng 90 độ, gập cổ cúi đầu ra trước khi nuốt, ăn thức ăn đặc/sệt (chế độ ăn làm đặc - Thickened liquids).", "D. Bơm thức ăn thật nhanh vào miệng."], "c": 2, "e": "Cúi gập cổ giúp nắp thanh môn đóng kín đường thở. Nước lỏng trôi quá nhanh dễ gây sặc, do đó phải pha bột làm đặc thức ăn."}, {"q": "Câu 65: Đai nâng đỡ khớp vai (Shoulder sling) được chỉ định chặt chẽ trong trường hợp nào?", "a": ["A. Bệnh nhân đang ngủ.", "B. Bán trật khớp vai giai đoạn liệt mềm khi bệnh nhân đứng/đi để chống xệ chỏm xương cánh tay.", "C. Bệnh nhân đang bị co cứng mạnh khớp vai.", "D. Liệt mặt."], "c": 1, "e": "Lực hút trái đất kéo tay liệt trễ xuống làm giãn dây chằng. Đai treo giúp nâng chỏm xương cánh tay lên khi di chuyển."}, {"q": "Câu 66: Tại sao người nhà KHÔNG ĐƯỢC kéo, xách bệnh nhân đột quỵ bằng cách nắm vào cánh tay bên liệt?", "a": ["A. Vì làm bệnh nhân ngứa.", "B. Vì dễ làm tụ máu dưới da.", "C. Vì khớp vai bên liệt đang rất lỏng lẻo, kéo xách sẽ gây rách bao khớp, tổn thương đám rối thần kinh cánh tay và trật khớp vĩnh viễn.", "D. Vì làm tăng huyết áp."], "c": 2, "e": "Đây là lỗi chăm sóc kinh điển, gây ra \"Đau vai liệt\" rất khủng khiếp, làm cản trở toàn bộ quá trình PHCN."}, {"q": "Câu 67: Khi hướng dẫn bệnh nhân tự chuyển từ giường sang xe lăn, xe lăn nên được đặt ở vị trí nào?", "a": ["A. Bên phía tay chân liệt.", "B. Ở phía đối diện, chếch 45 độ so với giường, tiếp giáp với bên LÀNH của bệnh nhân.", "C. Để xa giường 2 mét.", "D. Vuông góc 90 độ bên tay liệt."], "c": 1, "e": "Đặt xe lăn bên lành để bệnh nhân có thể dùng tay lành bám vào thành xe và chân lành làm trụ xoay người sang."}, {"q": "Câu 68: Rối loạn cảm giác, đặc biệt là mất cảm giác nông (đau, nhiệt) ở nửa người liệt, mang lại nguy cơ gì trong sinh hoạt?", "a": ["A. Bệnh nhân dễ bị tăng đường huyết.", "B. Bệnh nhân dễ bị bỏng do nước nóng, tổn thương tay chân khi va đập do không còn cảm giác bảo vệ.", "C. Bệnh nhân bị mù lòa.", "D. Bệnh nhân hay buồn nôn."], "c": 1, "e": "Cảm giác đau giúp rụt tay lại khi đụng vật nóng. Mất cảm giác này gây ra các vết thương nghiêm trọng không ngờ tới."}, {"q": "Câu 69: Yếu tố tiên lượng TỐT cho khả năng phục hồi đi lại sau TBMMN là gì?", "a": ["A. Tuổi cao, có tiểu không tự chủ.", "B. Phục hồi kiểm soát thân mình (tự ngồi vững) sớm trong vài tuần đầu và có sức cơ gập háng, duỗi gối sớm.", "C. Hôn mê kéo dài.", "D. Liệt mềm vĩnh viễn không tăng trương lực cơ."], "c": 1, "e": "Khả năng giữ thăng bằng ngồi là tiền đề bắt buộc để đứng. Có dấu hiệu vận động chi dưới sớm hứa hẹn đi lại được."}, {"q": "Câu 70: Để phòng ngừa co rút cổ chân, bàn chân rũ ở bệnh nhân nằm liệt giường, cần sử dụng dụng cụ gì?", "a": ["A. Băng thun quấn chặt cổ chân.", "B. Ván chống xoay hoặc gối/nệm kê bàn chân vuông góc 90 độ.", "C. Kéo tạ.", "D. Cho đi giày cao gót."], "c": 1, "e": "Giữ cổ chân gập mu 90 độ liên tục giúp gân gót (Achilles) không bị co ngắn lại do tác dụng của trọng lực và trương lực cơ."}, {"q": "Câu 71: Phương pháp Bobath (Neuro-Developmental Treatment - NDT) trong PHCN đột quỵ dựa trên nguyên lý thần kinh nào?", "a": ["A. Bắt bệnh nhân tập tạ liên tục.", "B. Ức chế các mẫu vận động bệnh lý (co cứng, phản xạ nguyên thủy) và tạo thuận (kích thích) các mẫu vận động chức năng bình thường thông qua các điểm chìa khóa (Key points of control).", "C. Chỉ sử dụng kích thích điện.", "D. Cắt đứt các dây thần kinh tủy sống."], "c": 1, "e": "Bobath là kỹ thuật kinh điển, kỹ thuật viên dùng tay điều chỉnh tư thế tại hông/vai để não tự tổ chức lại đường truyền thần kinh."}, {"q": "Câu 72: Giai đoạn Sốc não (Cerebral shock/Diaschisis) tương ứng với tình trạng lâm sàng nào của trương lực cơ?", "a": ["A. Co cứng rất mạnh.", "B. Liệt mềm hoàn toàn, mất phản xạ gân xương, mất trương lực cơ.", "C. Run giật cơ.", "D. Múa vờn."], "c": 1, "e": "Tương tự sốc tủy, các tế bào thần kinh vùng lân cận ổ nhồi máu tạm thời \"ngưng hoạt động\" dẫn đến liệt mềm hoàn toàn trong vài ngày đến vài tuần đầu."}, {"q": "Câu 73: Hội chứng đau vai-bàn tay (Shoulder-Hand Syndrome / CRPS type 1) ở bệnh nhân liệt nửa người có đặc điểm gì?", "a": ["A. Chỉ đau duy nhất ở ngón cái.", "B. Đau dữ dội ở khớp vai, kèm theo bàn tay sưng phù, đỏ, bóng, đau buốt và giới hạn vận động, sau đó teo cơ, co rút.", "C. Bàn tay tím ngắt, lạnh ngắt nhưng không đau.", "D. Hoại tử rụng đốt ngón tay."], "c": 1, "e": "Đây là Rối loạn đau vùng cục bộ phức tạp (CRPS) do rối loạn thần kinh giao cảm. Rất khó điều trị và gây tàn phế tay liệt vĩnh viễn."}, {"q": "Câu 74: Trong kỹ thuật tập di chuyển bằng gậy cho bệnh nhân liệt nửa người (Gậy 1 chân hoặc gậy 4 chân), tay nào sẽ cầm gậy?", "a": ["A. Tay bên liệt.", "B. Tay bên lành.", "C. Cầm bằng cả 2 tay.", "D. Người nhà cầm gậy hộ."], "c": 1, "e": "Cầm gậy bên LÀNH, gậy cùng bước lên với chân LIỆT để tạo thành diện chân đế vững chắc 3 điểm."}, {"q": "Câu 75: Thuốc nào sau đây được FDA công nhận dùng để Tiêm tại chỗ điều trị tình trạng co cứng cơ nặng (Spasticity) sau đột quỵ?", "a": ["A. Paracetamol", "B. Botulinum Toxin type A (Botox) tiêm vào cơ.", "C. Vitamin B12", "D. Kháng sinh Penicillin"], "c": 1, "e": "Botox ức chế giải phóng Acetylcholine tại rãnh thần kinh - cơ, làm liệt cơ tạm thời (khoảng 3-6 tháng), giúp giãn cơ co cứng để tập VLTL."}, {"q": "Câu 76: Hiện tượng \"Đồng vận\" (Synergies) trong đột quỵ có nghĩa là gì?", "a": ["A. Bệnh nhân có thể vận động độc lập từng ngón tay.", "B. Khi cố gắng cử động một khớp, toàn bộ các cơ trong cùng một mẫu (gấp hoặc duỗi) bị huy động hàng loạt không thể tách rời.", "C. Khả năng phối hợp 2 tay hoàn hảo.", "D. Vận động mắt và miệng đồng thời."], "c": 1, "e": "Do mất kiểm soát vỏ não, bệnh nhân muốn nhấc cánh tay lên thì tự động khuỷu, cổ tay và ngón tay đều co quắp lại."}, {"q": "Câu 77: Tổn thương động mạch não giữa (MCA - Middle Cerebral Artery) thường gây ra triệu chứng kinh điển nào?", "a": ["A. Liệt nửa người, ưu thế ở CHÂN nhiều hơn tay và mặt.", "B. Liệt nửa người, ưu thế ở TAY và MẶT nhiều hơn chân, kèm mất ngôn ngữ (nếu ở bán cầu ưu thế).", "C. Mù màu hoàn toàn.", "D. Rối loạn thăng bằng, chóng mặt dữ dội."], "c": 1, "e": "ĐM não giữa cấp máu cho vùng vận động của mặt và tay ở mặt ngoài vỏ não; ĐM não trước cấp máu cho vùng chân ở khe liên bán cầu."}, {"q": "Câu 78: Kỹ thuật \"Trị liệu vận động cưỡng bức\" (Constraint-Induced Movement Therapy - CIMT) áp dụng cho chi trên thực hiện như thế nào?", "a": ["A. Trói tay liệt lại không cho cử động.", "B. Bó bột hoặc đeo găng hạn chế hoàn toàn tay LÀNH (90% thời gian thức), bắt buộc não phải nỗ lực sử dụng và phục hồi tay LIỆT.", "C. Tiêm điện vào tay lành.", "D. Kéo giãn cơ tay liệt bằng máy."], "c": 1, "e": "CIMT vượt qua \"Sự không sử dụng do tập nhiễm\" (Learned non-use), thúc đẩy tính dẻo dai thần kinh bằng cách ép não sử dụng tay bệnh."}, {"q": "Câu 79: Kỹ năng nào sau đây là yêu cầu khó nhất trong tập thăng bằng tư thế?", "a": ["A. Ngồi tĩnh (không tựa lưng).", "B. Đứng tĩnh.", "C. Đứng thăng bằng động (Đứng một chân hoặc vừa đứng vừa vươn tay ra xa nhặt đồ vật).", "D. Nằm ngửa."], "c": 2, "e": "Thăng bằng động đòi hỏi sự điều chỉnh trọng tâm liên tục của tiểu não và hệ tiền đình, là bài test cao nhất chống té ngã."}, {"q": "Câu 80: \"Hội chứng giả hành tủy\" (Pseudobulbar palsy) ở bệnh nhân nhồi máu não nhiều lần/nhồi máu lỗ khuyết 2 bên có biểu hiện tâm thần kinh đặc trưng nào?", "a": ["A. Không bao giờ cười.", "B. Cảm xúc không ổn định, khóc hoặc cười mất kiểm soát không rõ lý do (Cảm xúc giả).", "C. Mất trí nhớ ngắn hạn hoàn toàn.", "D. Hoang tưởng ảo giác."], "c": 1, "e": "Do tổn thương đường vỏ não-hành não hai bên, người bệnh dễ dàng khóc òa lên hoặc cười sặc sụa dù không có kích thích cảm xúc tương ứng."}, {"q": "Câu 81: Nguyên nhân phổ biến nhất gây tổn thương tủy sống (TTTS) là gì?", "a": ["A. Nhiễm trùng tủy (Viêm tủy)", "B. Chấn thương cột sống (do tai nạn giao thông, té cao, tai nạn lao động).", "C. U tủy", "D. Thoái hóa cột sống"], "c": 1, "e": "Chấn thương cơ học là tác nhân hàng đầu gây gãy/trật đốt sống, chèn ép hoặc đứt ngang tủy sống."}, {"q": "Câu 82: Liệt tứ chi (Tetraplegia/Quadriplegia) xảy ra khi tổn thương tủy sống ở đoạn nào?", "a": ["A. Tủy ngực (T1 - T12)", "B. Tủy thắt lưng (L1 - L5)", "C. Tủy cổ (C1 - C8)", "D. Đuôi ngựa"], "c": 2, "e": "Tổn thương tủy cổ sẽ làm mất vận động/cảm giác cả 4 chi, phần thân mình và có thể cả cơ hô hấp."}, {"q": "Câu 83: Liệt hai chi dưới (Paraplegia) xảy ra khi tổn thương tủy ở các đoạn nào?", "a": ["A. Tủy cổ", "B. Tủy ngực, tủy thắt lưng hoặc tủy cùng.", "C. Bán cầu não", "D. Cuống não"], "c": 1, "e": "Hai tay bình thường, chỉ mất chức năng từ thân mình trở xuống tương ứng với mức tủy bị tổn thương."}, {"q": "Câu 84: Biến chứng cực kỳ nguy hiểm, đe dọa sinh mạng do tỳ đè ở bệnh nhân TTTS là gì?", "a": ["A. Rụng tóc", "B. Mụn trứng cá", "C. Loét tỳ đè (Pressure ulcers).", "D. Chàm da"], "c": 2, "e": "Bệnh nhân mất cảm giác, nằm bất động khiến mô bị chèn ép thiếu máu nuôi, gây hoại tử sâu đến tận xương, dẫn đến nhiễm trùng huyết."}, {"q": "Câu 85: Biện pháp quan trọng nhất để phòng ngừa loét tỳ đè cho bệnh nhân nằm liệt là gì?", "a": ["A. Bôi phấn rôm", "B. Lăn trở, thay đổi tư thế thường xuyên mỗi 2 giờ/lần.", "C. Nằm nệm cứng", "D. Uống kháng sinh dự phòng"], "c": 1, "e": "Lăn trở giúp giải phóng áp lực cho các vùng xương nhô, tái lập tuần hoàn máu."}, {"q": "Câu 86: Đặc điểm của Giai đoạn choáng tủy (Sốc tủy - Spinal shock) ngay sau chấn thương là gì?", "a": ["A. Bệnh nhân sốt rất cao.", "B. Huyết áp tăng vọt.", "C. Liệt mềm hoàn toàn, mất tất cả các phản xạ và mất cảm giác dưới mức tổn thương.", "D. Co cứng cơ dữ dội."], "c": 2, "e": "Tủy sống bị \"ngất\" tạm thời, ngưng mọi hoạt động truyền dẫn và phản xạ. Giai đoạn này kéo dài từ vài ngày đến vài tuần."}, {"q": "Câu 87: Thang điểm quốc tế được sử dụng chuẩn mực nhất để phân loại mức độ tổn thương tủy sống là gì?", "a": ["A. Thang điểm Glasgow", "B. Thang điểm ASIA (American Spinal Injury Association).", "C. Thang điểm Child-Pugh", "D. Thang điểm APGAR"], "c": 1, "e": "ASIA đánh giá vận động và cảm giác theo từng khoanh da (dermatome) và cơ (myotome) để xác định mức tủy tổn thương."}, {"q": "Câu 88: Theo phân loại ASIA, ASIA A có nghĩa là gì?", "a": ["A. Tổn thương không hoàn toàn, còn cảm giác.", "B. Tổn thương hoàn toàn: Mất toàn bộ chức năng vận động và cảm giác ở vùng tủy cùng S4-S5.", "C. Bình thường.", "D. Vận động còn tốt."], "c": 1, "e": "Hoàn toàn không còn tín hiệu dẫn truyền nào đi qua vùng tủy tổn thương xuống đáy chậu."}, {"q": "Câu 89: Một trong những biến chứng tiết niệu phổ biến nhất ở bệnh nhân TTTS là gì?", "a": ["A. Suy thận cấp do mất nước.", "B. Rối loạn chức năng bàng quang (Bàng quang thần kinh) dẫn đến bí tiểu, trào ngược và nhiễm trùng tiểu.", "C. Tiểu đường.", "D. Sỏi niệu đạo bẩm sinh."], "c": 1, "e": "Mất kiểm soát cơ vòng và cơ chóp bàng quang khiến nước tiểu ứ đọng, vi khuẩn sinh sôi gây nhiễm trùng lan lên thận."}, {"q": "Câu 90: Dụng cụ hỗ trợ di chuyển độc lập chủ yếu cho bệnh nhân liệt 2 chi dưới (Tổn thương tủy ngực thấp) là gì?", "a": ["A. Xe tập đi", "B. Xe lăn tay (Wheelchair)", "C. Nạng nách", "D. Gậy 1 chân"], "c": 1, "e": "Hai tay còn khỏe hoàn toàn, bệnh nhân dùng xe lăn tay để sinh hoạt, di chuyển và làm việc độc lập."}, {"q": "Câu 91: Ở bệnh nhân TTTS cổ cao (C1-C3), chức năng sống còn nào bị đe dọa trực tiếp cần cấp cứu hô hấp?", "a": ["A. Nhịp tim nhanh", "B. Liệt cơ hoành gây suy hô hấp cấp, cần thở máy.", "C. Rối loạn tiêu hóa", "D. Tăng huyết áp"], "c": 1, "e": "Thần kinh hoành (C3-C4-C5) chi phối cơ hoành (cơ hô hấp chính). Tổn thương ở đây làm ngừng thở ngay lập tức."}, {"q": "Câu 92: Huyết khối tĩnh mạch sâu (DVT) ở bệnh nhân liệt thường xảy ra ở vùng nào?", "a": ["A. Tĩnh mạch cảnh cổ", "B. Tĩnh mạch chủ dưới", "C. Tĩnh mạch sâu cẳng chân, đùi.", "D. Tĩnh mạch cửa gan"], "c": 2, "e": "Máu ứ đọng ở chi dưới do cơ không co bóp bơm máu về tim, dễ hình thành cục máu đông gây tắc mạch phổi."}, {"q": "Câu 93: Biện pháp cơ học nào giúp phòng ngừa Huyết khối tĩnh mạch sâu (DVT) chi dưới?", "a": ["A. Nằm bất động tuyệt đối.", "B. Tập vận động thụ động chi dưới, xoa bóp, mang vớ y khoa áp lực.", "C. Bó bột hai chân.", "D. Ngâm chân nước nóng."], "c": 1, "e": "Vớ áp lực và vận động giúp ép tĩnh mạch, đẩy dòng máu lưu thông trở về tim."}, {"q": "Câu 94: Khái niệm \"Chăm sóc đường ruột\" (Bowel program) ở bệnh nhân TTTS nhằm giải quyết tình trạng gì?", "a": ["A. Viêm ruột thừa.", "B. Rối loạn đại tiện (Táo bón nặng, ứ đọng phân hoặc tiêu ra quần không tự chủ).", "C. Loét dạ dày.", "D. Tiêu chảy cấp."], "c": 1, "e": "Bệnh nhân mất cảm giác mót rặn và liệt cơ thắt hậu môn, cần lên lịch móc phân hoặc dùng thuốc thụt tháo định kỳ."}, {"q": "Câu 95: Trong giai đoạn phục hồi sau choáng tủy, tình trạng liệt mềm chuyển sang tình trạng gì?", "a": ["A. Bình thường trở lại.", "B. Liệt cứng (Spasticity) với sự xuất hiện các phản xạ tủy quá mức.", "C. Rung giật cơ vĩnh viễn.", "D. Mất cơ bắp."], "c": 1, "e": "Khi tủy thoát sốc, do mất tín hiệu ức chế từ não bộ, các cung phản xạ tại tủy hoạt động tự do gây co cứng cơ, giật rung."}, {"q": "Câu 96: Biến chứng \"Phản xạ tự động tủy\" (Autonomic Dysreflexia) là một cấp cứu nội khoa, thường xảy ra ở nhóm bệnh nhân có mức tổn thương tủy từ đâu trở lên?", "a": ["A. Tủy thắt lưng (L1)", "B. Tủy cùng (S1)", "C. Tủy ngực T6 trở lên (Từ C1 đến T6).", "D. Chỉ ở tủy cổ C1."], "c": 2, "e": "Tổn thương trên mức T6 cắt đứt đường dẫn truyền phó giao cảm từ não xuống, làm hệ giao cảm dưới tổn thương tự do hoạt động không kiểm soát."}, {"q": "Câu 97: Triệu chứng lâm sàng điển hình nhất của \"Phản xạ tự động tủy\" là gì?", "a": ["A. Huyết áp tụt sâu, nhịp tim nhanh.", "B. Huyết áp tăng vọt dữ dội, đau đầu như búa bổ, nhịp tim chậm, vã mồ hôi và đỏ bừng ở phần cơ thể TRÊN mức tổn thương.", "C. Sốt 40 độ C.", "D. Hôn mê sâu."], "c": 1, "e": "Một kích thích độc hại (như bàng quang căng) gây co mạch mạnh dưới mức tổn thương đẩy huyết áp lên rất cao (có thể vỡ mạch máu não)."}, {"q": "Câu 98: Xử trí cấp cứu ĐẦU TIÊN và quan trọng nhất khi bệnh nhân có cơn Phản xạ tự động tủy là gì?", "a": ["A. Cho nằm đầu thấp.", "B. Tiêm thuốc trợ tim.", "C. Đỡ bệnh nhân ngồi dậy/nâng cao đầu giường ngay lập tức, sau đó tìm và loại bỏ kích thích (thường là do tắc ống thông tiểu bàng quang).", "D. Truyền dịch tĩnh mạch."], "c": 2, "e": "Tư thế ngồi giúp làm hạ huyết áp tư thế nhờ trọng lực, sau đó nhanh chóng xả bàng quang (nguyên nhân gây kích thích 80% trường hợp)."}, {"q": "Câu 99: Loét tỳ đè Độ 1 có biểu hiện lâm sàng như thế nào?", "a": ["A. Vết thương hở, chảy dịch mủ.", "B. Vùng da bị đỏ lên, ấn vào không mất màu đỏ (da còn nguyên vẹn).", "C. Hoại tử lộ mô mỡ dưới da.", "D. Lộ gân và xương."], "c": 1, "e": "Độ 1 là tổn thương biểu bì nhẹ, báo hiệu máu không tưới được mô, có thể phục hồi nếu thay đổi tư thế ngay."}, {"q": "Câu 100: Loét tỳ đè Độ 3 được phân loại dựa trên đặc điểm tổn thương nào?", "a": ["A. Tổn thương trợt lớp biểu bì và chân bì (như vết phồng rộp).", "B. Tổn thương mất da toàn bộ, hoại tử tổ chức dưới da lan tới lớp mỡ (nhưng chưa qua lớp mạc cơ).", "C. Lộ xương sọ.", "D. Mảng hoại tử đen kín mít."], "c": 1, "e": "Loét sâu thành hố, thấy lớp mỡ vàng nhưng chưa thấy gân cơ là Độ 3."}, {"q": "Câu 101: Phương pháp quản lý bàng quang (đường tiểu) TỐT NHẤT và an toàn nhất hiện nay cho bệnh nhân TTTS để giảm nguy cơ nhiễm trùng và suy thận là gì?", "a": ["A. Đặt ống thông tiểu lưu (Foley) rút ra mỗi tháng 1 lần.", "B. Rạch bàng quang ra da vĩnh viễn.", "C. Đặt thông tiểu ngắt quãng sạch (Clean Intermittent Catheterization - CIC) mỗi 4-6 giờ/lần.", "D. Ấn vắt bàng quang bằng tay."], "c": 2, "e": "CIC bắt chước nhịp sinh lý của bàng quang (tích nước rồi xả cạn), không lưu ống thường xuyên nên hạn chế tối đa vi khuẩn bám vào tạo biofilm."}, {"q": "Câu 102: \"Hạ huyết áp tư thế đứng\" (Orthostatic Hypotension) ở bệnh nhân TTTS liệt tứ chi xảy ra do cơ chế nào?", "a": ["A. Suy tim.", "B. Mất trương lực giao cảm làm các mạch máu ở chân và tạng không co lại được, máu dồn xuống thấp khi bệnh nhân chuyển từ nằm sang ngồi/đứng.", "C. Do phản xạ tủy tăng.", "D. Bệnh nhân uống thiếu nước."], "c": 1, "e": "Máu tụ lại ở tĩnh mạch chi dưới do cơ trơn mạch máu và cơ bắp chân bị liệt, dẫn đến thiếu máu não gây chóng mặt ngất xỉu."}, {"q": "Câu 103: Biện pháp PHCN để khắc phục chứng Hạ huyết áp tư thế là gì?", "a": ["A. Cho uống thuốc lợi tiểu.", "B. Quấn băng chun/vớ áp lực hai chân, nịt bụng, và cho bệnh nhân tập ngồi dậy từ từ (dùng giường quay hoặc bàn nghiêng).", "C. Bó bột toàn thân.", "D. Mổ nối mạch máu."], "c": 1, "e": "Băng ép chân và nịt bụng ép máu không bị dồn xuống. Nâng đầu giường từ từ giúp cơ thể tập thích nghi lại phản xạ vận mạch."}, {"q": "Câu 104: Biến chứng \"Tạo xương lệch chỗ\" (Heterotopic Ossification - HO) ở bệnh nhân TTTS là hiện tượng gì?", "a": ["A. Gãy xương cột sống.", "B. Canxi lắng đọng và tạo thành xương ở các phần mềm ngoài xương (như cơ, quanh các khớp lớn háng, gối) làm cứng khớp, sưng nóng.", "C. Xương sọ mọc to ra.", "D. Răng mọc thêm."], "c": 1, "e": "Đây là biến chứng vô căn, cơ bị cốt hóa thành khối xương cứng ngắc làm bệnh nhân không gập được khớp háng để ngồi xe lăn."}, {"q": "Câu 105: Tổn thương hội chứng Đuôi ngựa (Cauda Equina Syndrome) là tổn thương thần kinh kiểu gì?", "a": ["A. Tổn thương thần kinh trung ương (Tủy sống trên L1).", "B. Tổn thương thần kinh ngoại biên (Các rễ thần kinh tủy sống chạy dưới chóp tủy), gây liệt mềm, mất phản xạ gân xương chi dưới và rối loạn cơ vòng.", "C. Tổn thương não.", "D. Liệt nửa người."], "c": 1, "e": "Dưới L1, tủy sống kết thúc, chỉ còn các rễ thần kinh thả xuống như đuôi ngựa. Tổn thương rễ là tổn thương thần kinh ngoại biên (liệt mềm)."}, {"q": "Câu 106: Để kiểm tra trương lực cơ vòng hậu môn (thăm khám trực tràng) trong phân loại ASIA, mục đích chính là để làm gì?", "a": ["A. Khám tiêu hóa.", "B. Xác định tổn thương tủy là HOÀN TOÀN hay KHÔNG HOÀN TOÀN (Vùng S4-S5).", "C. Đo nhiệt độ.", "D. Lấy phân xét nghiệm."], "c": 1, "e": "Nếu bệnh nhân còn cảm nhận được ngón tay bác sĩ quanh hậu môn hoặc còn khả năng thót cơ vòng, đó là tổn thương Không hoàn toàn (Tiên lượng phục hồi tốt hơn)."}, {"q": "Câu 107: Trong đánh giá cơ lực (Motor score) theo ASIA, sức cơ đạt \"Bậc 3\" có nghĩa là gì?", "a": ["A. Không có sự co cơ.", "B. Co cơ nhưng không tạo ra cử động khớp.", "C. Cử động được hết tầm vận động khớp thắng được trọng lực, nhưng không thắng được lực cản.", "D. Vận động bình thường chống lại lực cản tối đa."], "c": 2, "e": "Bậc 3 là ngưỡng nhấc được tay/chân lên khỏi mặt giường nhưng bị đè nhẹ là rớt xuống."}, {"q": "Câu 108: Giai đoạn phục hồi chức năng toàn diện cho người liệt hai chi dưới tập trung vào mục tiêu nào để di chuyển?", "a": ["A. Tập đi bằng nạng nách kết hợp nẹp KAFO (Nẹp hông-gối-cổ-bàn chân) cho đoạn ngực thấp/thắt lưng.", "B. Tập múa.", "C. Nằm liệt giường mãi mãi.", "D. Bơi lội chuyên nghiệp."], "c": 0, "e": "Bệnh nhân tổn thương T10-L1 tay rất khỏe, có thể mang nẹp khóa cứng khớp gối và dùng nạng để bước đi theo kiểu \"đu đưa\"."}, {"q": "Câu 109: Bàn nghiêng (Tilt table) trong phòng tập Vật lý trị liệu có tác dụng gì lớn nhất?", "a": ["A. Làm bàn ăn cơm.", "B. Tập cho bệnh nhân làm quen với tư thế đứng để chống hạ huyết áp tư thế, chịu lực lên xương để chống loãng xương.", "C. Massage lưng.", "D. Chụp X-quang."], "c": 1, "e": "Trọng lực dồn lên chân khi đứng bàn nghiêng kích thích tế bào tạo xương hoạt động, ngăn canxi rút khỏi xương gây loãng xương nhanh ở người liệt."}, {"q": "Câu 110: Chăm sóc tâm lý cho bệnh nhân nam trẻ tuổi bị liệt tứ chi thường phải đối mặt với nỗi tuyệt vọng lớn nhất về vấn đề gì ngoài chức năng vận động?", "a": ["A. Khẩu vị ăn uống.", "B. Mất chức năng sinh dục (Cương dương, xuất tinh) và vô sinh.", "C. Rụng tóc.", "D. Mất giọng nói."], "c": 1, "e": "Tổn thương tủy cổ làm mất hoàn toàn khả năng cảm giác và vận động sinh lý tình dục bình thường, gây sang chấn tâm lý trầm trọng về bản lĩnh đàn ông."}, {"q": "Câu 111: Phân loại ASIA B được mô tả lâm sàng như thế nào?", "a": ["A. Tổn thương hoàn toàn.", "B. Tổn thương không hoàn toàn: Cảm giác được bảo tồn (kể cả S4-S5), nhưng KHÔNG CÓ chức năng vận động bảo tồn dưới mức tổn thương.", "C. Vận động bảo tồn, cơ lực < 3.", "D. Bình thường."], "c": 1, "e": "ASIA B là \"Incomplete Sensory\" - Bệnh nhân liệt hoàn toàn không cử động được, nhưng cấu vào chân hay quanh hậu môn thì vẫn biết đau/sờ."}, {"q": "Câu 112: Hội chứng \"Tủy trung tâm\" (Central Cord Syndrome) thường gặp ở bệnh nhân lớn tuổi bị chấn thương quá ưỡn cổ có đặc trưng gì?", "a": ["A. Liệt hai chân hoàn toàn, tay bình thường.", "B. Mất cảm giác đau nhiệt một nửa người.", "C. Liệt 2 TAY nặng hơn 2 CHÂN, thường kèm rối loạn cảm giác vùng cổ/vai như mang áo choàng.", "D. Mù lòa."], "c": 2, "e": "Các bó sợi thần kinh vận động chi trên nằm ở trung tâm tủy cổ, khi lõi tủy bị giập chảy máu (thường do hẹp ống sống) thì tay bị liệt nặng hơn chân."}, {"q": "Câu 113: Hội chứng Brown-Séquard (Cắt nửa tủy) có biểu hiện tổn thương thần kinh bắt chéo rất đặc biệt nào?", "a": ["A. Liệt đều cả 2 bên.", "B. Cùng bên tổn thương: Liệt vận động và mất cảm giác sâu. Đối bên tổn thương: Mất cảm giác nông (đau, nhiệt).", "C. Liệt cảm giác toàn thân.", "D. Mất vận động hoàn toàn, cảm giác bình thường."], "c": 1, "e": "Bó tháp (vận động) và bó cảm giác sâu đi thẳng cùng bên, bó gai đồi thị (cảm giác nông) bắt chéo tủy. Chém đứt nửa phải tủy sẽ gây liệt chân phải nhưng kim châm chân trái lại không thấy đau."}, {"q": "Câu 114: Cơ chế sinh bệnh của sự \"Co cứng\" (Spasticity) trong giai đoạn phục hồi của TTTS là gì?", "a": ["A. Đứt dây thần kinh cơ.", "B. Do sự nảy chồi (sprouting) của các sợi thần kinh mới và mất sự ức chế từ bó tháp ở não giáng xuống, làm các cung phản xạ tủy hoạt động quá mức cường độ.", "C. Khớp bị dính lại do canxi.", "D. Suy dinh dưỡng tủy."], "c": 1, "e": "Neuron vận động dưới không còn bị \"quản lý\" bởi não bộ, trở nên cực kỳ nhạy cảm. Chỉ cần kích thích nhẹ (chạm vào chân, bàng quang đầy) là chân sẽ giật và gồng cứng."}, {"q": "Câu 115: Ưu điểm của phương pháp thông tiểu ngắt quãng (CIC) so với dẫn lưu bàng quang ra da (Mở bàng quang trên xương mu) là gì?", "a": ["A. Không bao giờ bị nhiễm khuẩn.", "B. Duy trì khả năng chứa đựng sinh lý của bàng quang, bệnh nhân không phải mang túi nước tiểu lủng lẳng, cải thiện hình ảnh cơ thể và chất lượng sống.", "C. Không cần phải làm gì cả.", "D. Rẻ tiền hơn nhiều."], "c": 1, "e": "CIC giúp bàng quang giãn nở co bóp tự nhiên (dù bằng thao tác rút tay), giữ bàng quang không bị teo nhỏ và bệnh nhân có thể mặc đồ bơi, đi làm bình thường."}, {"q": "Câu 116: Thuốc điều trị nội khoa được ưu tiên sử dụng để giảm tình trạng co cứng cơ toàn thân ở bệnh nhân TTTS là gì?", "a": ["A. Paracetamol", "B. Baclofen (thuốc giãn cơ tác dụng trung ương).", "C. Kháng sinh", "D. Aspirin"], "c": 1, "e": "Baclofen ức chế dẫn truyền thần kinh tại tủy sống (thụ thể GABA B), giúp làm dịu các cơn gồng cứng và co giật cơ."}, {"q": "Câu 117: Mức tổn thương tủy cổ (C) nào bệnh nhân vẫn CÓ THỂ tự lái xe lăn tay được (Sử dụng khối cơ tam đầu và các cơ duỗi cổ tay)?", "a": ["A. C3 - C4", "B. C5", "C. C6 - C7", "D. Không thể lái được ở bất kỳ mức tủy cổ nào."], "c": 2, "e": "Mức C6 bảo tồn cơ duỗi cổ tay (Radial wrist extensors), cho phép bệnh nhân sử dụng động tác \"nắm giữ cơ năng\" (Tenodesis grip) để móc vào vành đẩy xe lăn."}, {"q": "Câu 118: Cấu tạo của xe lăn tiêu chuẩn cho người liệt hai chi dưới cần đặc điểm gì để phòng loét tỳ đè ở ụ ngồi?", "a": ["A. Phải có nệm ngồi giảm áp suất (Pressure-relieving cushion như nệm khí Roho).", "B. Ghế ngồi bằng gỗ cứng.", "C. Không cần nệm.", "D. Bánh xe bằng nhựa đặc."], "c": 0, "e": "Bệnh nhân ngồi xe lăn liên tục 12-14 tiếng/ngày. Mất cảm giác ở mông cộng với áp lực xương chậu sẽ gây khoét lỗ mông rất nhanh nếu không có nệm khí phân tán lực."}, {"q": "Câu 119: Phẫu thuật \"Tạo hình gân cơ\" (Tendon transfer) ở bệnh nhân liệt tứ chi mức C6 nhằm mục đích gì?", "a": ["A. Chữa khỏi liệt tủy.", "B. Di chuyển gân của một cơ LÀNH (VD: cơ cánh tay quay) nối vào gân của một cơ LIỆT (VD: cơ gấp các ngón tay sâu) để phục hồi động tác cầm nắm đồ vật.", "C. Nối lại tủy sống.", "D. Cắt bỏ chi bị liệt."], "c": 1, "e": "Đây là phẫu thuật PHCN thần kỳ, \"hiến\" một cơ dư thừa sức mạnh để làm nhiệm vụ của cơ đã chết, mang lại khả năng tự bốc thức ăn cho bệnh nhân liệt cổ."}, {"q": "Câu 120: Biểu hiện lâm sàng của \"Sốc thần kinh\" (Neurogenic shock) phân biệt với \"Sốc tủy\" (Spinal shock) ở điểm nào?", "a": ["A. Cả hai là một.", "B. Sốc tủy là hiện tượng sinh lý thần kinh (liệt mềm, mất phản xạ); Sốc thần kinh là hiện tượng Huyết động học do mất trương lực giao cảm (Tụt huyết áp nặng KÈM Nhịp tim chậm).", "C. Sốc thần kinh gây tăng huyết áp.", "D. Sốc thần kinh chỉ gặp ở bệnh tim."], "c": 1, "e": "Sốc giảm thể tích thông thường thì huyết áp tụt, mạch nhanh (bù trừ). Sốc thần kinh do đứt dây giao cảm T1-T4 (chi phối tim) làm huyết áp tụt nhưng mạch lại chậm, rất nguy hiểm."}, {"q": "Câu 1: Đau cột sống thắt lưng (CSTL) thường do nguyên nhân nào chiếm tỷ lệ cao nhất?", "a": ["A. Nhiễm trùng cột sống", "B. Ung thư di căn xương", "C. Nguyên nhân cơ học (căng cơ, bong gân, sai tư thế)", "D. Viêm cột sống dính khớp"], "c": 2, "e": "Đa số các trường hợp đau thắt lưng (hơn 80%) là đau cơ học do sai tư thế, làm việc nặng hoặc căng giãn cơ, dây chằng quá mức."}, {"q": "Câu 2: Cấu trúc nào đóng vai trò như một \"bộ giảm xóc\" nằm giữa hai thân đốt sống?", "a": ["A. Dây chằng dọc trước", "B. Đĩa đệm", "C. Tủy sống", "D. Khớp liên mấu"], "c": 1, "e": "Đĩa đệm có nhân nhầy và vòng sợi, có khả năng đàn hồi giúp phân tán lực tác động lên cột sống."}, {"q": "Câu 3: Rễ thần kinh tọa (Thần kinh ngồi) được tạo thành từ các rễ thần kinh nào?", "a": ["A. C5, C6, C7", "B. T12, L1, L2", "C. L4, L5, S1, S2, S3", "D. S4, S5"], "c": 2, "e": "Thần kinh tọa là dây thần kinh lớn nhất cơ thể, tập hợp từ các rễ thắt lưng-cùng L4-S3."}, {"q": "Câu 4: Dấu hiệu nào sau đây được coi là \"Cờ đỏ\" (Red flags) cảnh báo bệnh lý nguy hiểm khi bệnh nhân bị đau thắt lưng?", "a": ["A. Đau nhức mỏi cơ lưng sau khi khuân vác", "B. Đau tăng khi cúi người", "C. Đau thắt lưng kèm theo sốt, sụt cân không rõ nguyên nhân, tê mất cảm giác vùng yên ngựa", "D. Đau thắt lưng giảm khi nghỉ ngơi"], "c": 2, "e": "Các dấu hiệu cờ đỏ gợi ý nguyên nhân ác tính (ung thư), nhiễm trùng hoặc chèn ép chùm đuôi ngựa cấp cứu."}, {"q": "Câu 5: Mục đích chính của Phục hồi chức năng (PHCN) đau CSTL là gì?", "a": ["A. Phẫu thuật thay đĩa đệm", "B. Cấp phát thuốc kháng sinh", "C. Giảm đau, phục hồi tầm vận động, sức mạnh cơ và phòng ngừa tái phát", "D. Bắt bệnh nhân nằm liệt giường"], "c": 2, "e": "PHCN giúp bệnh nhân nhanh chóng trở lại sinh hoạt bình thường và hướng dẫn tư thế đúng để bảo vệ cột sống."}, {"q": "Câu 6: Phương pháp nhiệt nóng trị liệu (như chườm nóng, hồng ngoại) có tác dụng chủ yếu gì trong đau CSTL cấp/bán cấp?", "a": ["A. Làm đông máu", "B. Tăng co thắt cơ", "C. Giãn cơ, tăng tuần hoàn tại chỗ và giảm đau", "D. Phá hủy mô viêm"], "c": 2, "e": "Nhiệt nóng làm tăng tưới máu, xả các chất chuyển hóa gây đau và làm giãn bó cơ đang co thắt."}, {"q": "Câu 7: Phương pháp kéo dãn cột sống (Traction) CHỐNG CHỈ ĐỊNH tuyệt đối trong trường hợp nào?", "a": ["A. Thoát vị đĩa đệm", "B. Thoái hóa cột sống", "C. Loãng xương nặng, lao cột sống, ung thư di căn cột sống", "D. Đau thần kinh tọa"], "c": 2, "e": "Kéo dãn lực mạnh trên xương giòn, mủn (do loãng xương, u, lao) sẽ làm gãy xương hoặc xẹp lún đốt sống ngay lập tức."}, {"q": "Câu 8: Đối với bệnh nhân đau cấp tính do thoát vị đĩa đệm, tư thế nằm nào giúp giảm áp lực nội đĩa đệm tốt nhất?", "a": ["A. Nằm sấp", "B. Nằm ngửa trên nệm cứng, có kê gối nhỏ dưới khoeo chân", "C. Nằm võng", "D. Nằm ngửa không kê gối"], "c": 1, "e": "Nằm ngửa gập nhẹ gối (kê gối dưới khoeo) giúp làm chùng cơ thắt lưng chậu và giảm áp lực kéo lên cột sống thắt lưng."}, {"q": "Câu 9: Áo nẹp cột sống (Corset) được khuyến cáo sử dụng trong thời điểm nào?", "a": ["A. Sử dụng 24/24 giờ suốt đời", "B. Trong giai đoạn đau cấp tính, khi di chuyển hoặc phải làm việc nặng", "C. Khi đang ngủ", "D. Khi tập thể dục"], "c": 1, "e": "Áo nẹp hỗ trợ chịu lực và giữ vững cột sống. Tuy nhiên lạm dụng sẽ gây teo cơ lưng, do đó chỉ dùng khi thật cần thiết."}, {"q": "Câu 10: Nghiệm pháp Schober được sử dụng để khám và đánh giá tình trạng gì?", "a": ["A. Độ sức mạnh cơ bụng", "B. Độ gập duỗi (độ giãn) của cột sống thắt lưng", "C. Cảm giác của chân", "D. Đau thần kinh tọa"], "c": 1, "e": "Test Schober đo độ giãn của khoảng cách 10cm trên cột sống thắt lưng khi cúi. Bình thường độ giãn là 14-15cm (tăng 4-5cm)."}, {"q": "Câu 11: Nghiệm pháp Lasègue dương tính thường gợi ý bệnh lý gì?", "a": ["A. Viêm khớp gối", "B. Chèn ép rễ thần kinh tọa (thường do thoát vị đĩa đệm)", "C. Loãng xương", "D. Sỏi thận"], "c": 1, "e": "Khi nâng thẳng chân, dây thần kinh tọa bị kéo căng. Nếu rễ thần kinh bị chèn ép, bệnh nhân sẽ đau dọc chân với góc < 70 độ."}, {"q": "Câu 12: Đau thần kinh tọa thường lan theo hướng nào?", "a": ["A. Lan từ rốn xuống bụng dưới", "B. Lan từ ngực lên vai", "C. Lan từ thắt lưng, qua mông, xuống mặt sau/ngoài đùi và cẳng chân", "D. Lan dọc hai tay"], "c": 2, "e": "Đây là đường đi giải phẫu kinh điển của dây thần kinh ngồi (thần kinh tọa)."}, {"q": "Câu 13: Siêu âm trị liệu (Ultrasound therapy) thuộc nhóm tác nhân vật lý nào?", "a": ["A. Nhiệt nóng nông", "B. Nhiệt sâu (kết hợp tác dụng cơ học vi xoa bóp)", "C. Ánh sáng trị liệu", "D. Điện trị liệu"], "c": 1, "e": "Sóng siêu âm xuyên qua mỡ, đi sâu vào cơ và dây chằng (3-5cm) để sinh nhiệt và tạo các vi xoa bóp cấp tế bào."}, {"q": "Câu 14: Dấu hiệu \"chuông bấm\" (Valleix) dương tính được khám bằng cách nào?", "a": ["A. Gõ búa phản xạ vào đầu gối", "B. Ấn các điểm dọc theo đường đi của dây thần kinh tọa ở mông và đùi", "C. Cầm cổ chân bệnh nhân xoay", "D. Cho bệnh nhân ho, rặn"], "c": 1, "e": "Dấu hiệu Valleix (+) khi ấn vào các điểm xuất chiếu của thần kinh tọa (VD: giữa nếp lằn mông) bệnh nhân đau chói lan xuống chân."}, {"q": "Câu 15: Bệnh nhân đau thắt lưng cấp tính do co thắt cơ dữ dội (Lumbago) nên làm gì đầu tiên?", "a": ["A. Chạy bộ 5km", "B. Tập gập lưng liên tục", "C. Nghỉ ngơi tại giường (vài ngày), kết hợp chườm ấm/lạnh, thuốc giảm đau và giãn cơ", "D. Đi bơi lội ngay"], "c": 2, "e": "Cơn đau cấp do co rút cơ cần nghỉ ngơi ngắn hạn để cơ nhả ra trước khi bắt đầu các bài tập vận động thụ động."}, {"q": "Câu 16: Chống chỉ định của sóng ngắn trị liệu (Shortwave Diathermy) áp dụng vùng thắt lưng là gì?", "a": ["A. Đau cơ cơ học", "B. Bệnh nhân có kim loại, máy tạo nhịp tim trong người, hoặc vùng có khối u, chảy máu", "C. Thoái hóa cột sống", "D. Viêm khớp dạng thấp"], "c": 1, "e": "Sóng ngắn là dòng điện cao tần, sẽ nung nóng kim loại bên trong cơ thể gây bỏng mô hoặc làm hỏng máy tạo nhịp."}, {"q": "Câu 17: Đặc điểm của góc Lasègue để xác định là dương tính thật sự do chèn ép rễ?", "a": ["A. Lớn hơn 90 độ", "B. Đau căng nhượng chân ở góc 80 độ", "C. Đau chói lan dọc đường đi thần kinh tọa khi nâng chân ở góc dưới 70 độ", "D. Không đau"], "c": 2, "e": "Dưới 70 độ, thần kinh tọa bị kéo căng thực sự. Đau ở góc lớn hơn thường chỉ là do căng gân kheo."}, {"q": "Câu 18: Lực kéo dãn cột sống thắt lưng ban đầu (bằng máy) thường được cài đặt ở mức nào?", "a": ["A. Bằng 100% trọng lượng cơ thể", "B. Khoảng 25-30% trọng lượng cơ thể (hoặc 1/3 trọng lượng)", "C. Bằng 5% trọng lượng cơ thể", "D. Tối đa 5kg"], "c": 1, "e": "Lực khoảng 1/3 cơ thể (VD: người 60kg kéo lực 20kg) đủ để thắng lực ma sát và làm giãn khoảng cách các đốt sống."}, {"q": "Câu 19: Khám thần kinh: Bệnh nhân mất phản xạ gân gót và tê mặt ngoài bàn chân, tổn thương khả năng cao ở rễ nào?", "a": ["A. Rễ L3", "B. Rễ L4", "C. Rễ L5", "D. Rễ S1"], "c": 3, "e": "Rễ S1 chi phối phản xạ gân gót, cơ dép (gập lòng cổ chân) và cảm giác bờ ngoài bàn chân."}, {"q": "Câu 20: Bệnh nhân yếu cơ chày trước (không thể đi được bằng gót chân, bàn chân rủ) thường do chèn ép rễ thần kinh nào?", "a": ["A. Rễ L4", "B. Rễ L5", "C. Rễ S1", "D. Rễ S2"], "c": 1, "e": "Rễ L5 chi phối cơ chày trước (giúp gập mu chân) và cơ duỗi dài ngón cái. Yếu rễ L5 khiến bệnh nhân rơi bàn chân."}, {"q": "Câu 21: \"Hội chứng chùm đuôi ngựa\" (Cauda Equina Syndrome) là một cấp cứu ngoại khoa, biểu hiện lâm sàng là gì?", "a": ["A. Đau thắt lưng âm ỉ", "B. Tê vùng yên ngựa (quanh hậu môn/sinh dục), rối loạn cơ vòng (bí tiểu, tiêu tiểu không tự chủ), yếu liệt hai chi dưới tiến triển", "C. Chỉ tê ngón chân cái", "D. Đau thắt lưng giảm khi đi bộ"], "c": 1, "e": "Chèn ép khối lớn vào toàn bộ các rễ thần kinh cùng cụt làm mất kiểm soát cơ thắt bàng quang/hậu môn, cần mổ giải ép khẩn cấp."}, {"q": "Câu 22: Bài tập William (William's flexion exercises) tập trung vào động tác nào?", "a": ["A. Ưỡn ngực ra sau", "B. Gập cột sống (như ép gối sát ngực) để giảm độ ưỡn thắt lưng, mở rộng lỗ liên hợp", "C. Xoay vặn cột sống", "D. Kéo xà đơn"], "c": 1, "e": "Tập gập giúp mở rộng các lỗ liên hợp (nơi dây thần kinh đi ra), rất tốt cho bệnh nhân hẹp ống sống hoặc trượt đốt sống."}, {"q": "Câu 23: Bài tập McKenzie (McKenzie extension exercises) thường ưu tiên chỉ định cho trường hợp nào?", "a": ["A. Trượt đốt sống ra trước", "B. Xẹp đốt sống do loãng xương", "C. Thoát vị đĩa đệm (không có chèn ép cấp) giúp đẩy nhân nhầy về lại trung tâm", "D. Viêm cột sống dính khớp"], "c": 2, "e": "Động tác duỗi (ưỡn ngực/cổ lên như rắn hổ mang) tạo lực ép phía sau đĩa đệm, dồn nhân nhầy thoát vị lùi lại về phía trước."}, {"q": "Câu 24: Hoạt động trị liệu (Ergonomics) bảo vệ cột sống hướng dẫn cách nâng vật nặng từ dưới đất lên như thế nào?", "a": ["A. Cúi gập lưng, giữ gối thẳng, với tay lấy vật", "B. Gập gối, giữ lưng thẳng tự nhiên, ôm vật sát vào người và dùng lực của đùi để đứng lên", "C. Xoay vặn cột sống và nhấc vật lên bằng 1 tay", "D. Ngồi xổm bẹt xuống đất rồi nhấc vật bằng sức lưng"], "c": 1, "e": "Cơ đùi rất khỏe. Giữ lưng thẳng và ôm sát vật giúp đưa trọng tâm vật về sát trục cơ thể, giảm lực đòn bẩy bẻ gãy đĩa đệm lưng."}, {"q": "Câu 25: Tác dụng giảm đau của dòng điện TENS (Kích thích thần kinh bằng điện qua da) dựa trên cơ chế nào?", "a": ["A. Tiêu diệt vi khuẩn", "B. Kích thích đóng \"cổng kiểm soát\" đau ở tủy sống và giải phóng Endorphin nội sinh", "C. Phá hủy rễ thần kinh", "D. Tạo nhiệt đốt cháy mô viêm"], "c": 1, "e": "Dòng TENS tạo xung điện kích thích các sợi thần kinh to (A-beta), làm khóa tín hiệu đau của các sợi nhỏ (A-delta, C) truyền lên não."}, {"q": "Câu 26: Theo case lâm sàng trong bài, Xẹp đốt sống D12, L5 ở bệnh nhân cao tuổi không có chấn thương mạnh thường do nguyên nhân gì?", "a": ["A. Lao cột sống", "B. Thoát vị đĩa đệm", "C. Loãng xương nặng", "D. Căng cơ"], "c": 2, "e": "Xương người già rỗng và giòn, chỉ cần ho mạnh hoặc hụt chân nhẹ cũng có thể làm xẹp lún thân đốt sống."}, {"q": "Câu 27: Thoát vị đĩa đệm ở khoang L4-L5 vị trí sau-bên thường chèn ép vào rễ thần kinh nào?", "a": ["A. Rễ L3", "B. Rễ L4", "C. Rễ L5", "D. Rễ S1"], "c": 2, "e": "Rễ L4 đã chui ra ngoài ở lỗ liên hợp trên, đĩa đệm L4-L5 lồi ra sẽ ép trúng rễ L5 đang chạy xuống dưới."}, {"q": "Câu 28: Phương pháp Thủy trị liệu (Hydrotherapy) có ưu điểm vượt trội gì cho bệnh nhân đau cột sống?", "a": ["A. Rất rẻ tiền", "B. Lực đẩy Acsimet của nước giúp giảm trọng lượng cơ thể đè lên cột sống, nước ấm giúp thư giãn cơ, tạo điều kiện vận động dễ dàng", "C. Chữa khỏi loãng xương", "D. Tiêu diệt vi sinh vật"], "c": 1, "e": "Tập dưới nước giúp bệnh nhân mất đi cảm giác đau do tỳ đè trọng lực, đồng thời nước kháng lực giúp tập mạnh cơ an toàn."}, {"q": "Câu 29: Đau do hẹp ống sống thắt lưng (Spinal stenosis) có triệu chứng lâm sàng đặc trưng nào?", "a": ["A. Đau liên tục không nghỉ", "B. Đau cách hồi thần kinh (Neurogenic claudication): Đau, tê hai chân khi đi bộ, phải ngồi xổm hoặc cúi gập người mới hết đau", "C. Đau khi nằm nghỉ", "D. Tê bì tay trái"], "c": 1, "e": "Khi đi bộ, cột sống ưỡn ra làm hẹp thêm ống sống. Tư thế cúi gập lưng giúp mở rộng ống sống nên bệnh nhân giảm đau tức thì."}, {"q": "Câu 30: \"Cơ cốt lõi\" (Core muscles) cần tập mạnh để ổn định cột sống thắt lưng bao gồm các cơ nào?", "a": ["A. Cơ ngực lớn và cơ nhị đầu", "B. Cơ hoành, cơ ngang bụng, cơ nhiều chân (Multifidus) và cơ sàn chậu", "C. Cơ bắp chân", "D. Cơ nâng vai"], "c": 1, "e": "Đây là nhóm cơ tạo thành chiếc \"áo nẹp\" sinh học ôm siết lấy các đốt sống thắt lưng, giữ cho cột sống không bị trượt khi vận động."}, {"q": "Câu 31: Trong thoát vị đĩa đệm cột sống thắt lưng, tại sao kỹ thuật kéo dãn cột sống lại giúp bệnh nhân giảm chèn ép?", "a": ["A. Vì nó bẻ gãy đĩa đệm", "B. Tạo áp lực âm tính (lực hút) bên trong đĩa đệm, giúp hút nhân nhầy tụt trở lại vị trí trung tâm và mở rộng lỗ liên hợp", "C. Đốt cháy nhân nhầy", "D. Kéo giãn dây thần kinh cho đứt"], "c": 1, "e": "Kéo dãn cơ học làm tách hai thân đốt sống ra xa nhau, khoảng chân không sinh ra sẽ hút phần đĩa đệm bị lòi thụt vào trong."}, {"q": "Câu 32: Bệnh nhân bị Trượt đốt sống thắt lưng ra trước (Spondylolisthesis), bài tập PHCN nào là CHỐNG CHỈ ĐỊNH?", "a": ["A. Tập gập bụng", "B. Bài tập gập cột sống William", "C. Bài tập duỗi ưỡn cột sống quá mức (McKenzie)", "D. Tập thở cơ hoành"], "c": 2, "e": "Động tác ưỡn lưng đẩy mỏm khớp ra trước nhiều hơn, làm tình trạng trượt đốt sống trầm trọng thêm và gây kẹt rễ thần kinh."}, {"q": "Câu 33: Chẩn đoán phân biệt đau cách hồi do Hẹp ống sống (Thần kinh) và Đau cách hồi do Tắc động mạch chi dưới (Mạch máu) bằng yếu tố nào?", "a": ["A. Ở bệnh mạch máu, đạp xe đạp tại chỗ vẫn gây đau (vì cơ bắp cần máu). Ở bệnh hẹp ống sống, đạp xe (tư thế cúi lưng) không gây đau hoặc đau muộn hơn.", "B. Hẹp ống sống đau khi nằm.", "C. Bệnh mạch máu không bao giờ đau.", "D. Hẹp ống sống có da chân tím tái."], "c": 0, "e": "Tư thế gập lưng trên xe đạp làm mở rộng ống sống thần kinh, nhưng lại không giải quyết được việc cơ bắp thiếu máu nếu bị tắc mạch."}, {"q": "Câu 34: Bệnh nhân đau thắt lưng kiểu viêm (như trong Viêm cột sống dính khớp) có tính chất đặc trưng nào?", "a": ["A. Đau tăng khi nghỉ ngơi, nhiều về nửa đêm gần sáng, kèm cứng khớp buổi sáng kéo dài, vận động thì giảm đau", "B. Đau tăng khi làm việc, nghỉ ngơi thì hết", "C. Đau dữ dội sau chấn thương", "D. Không bao giờ cứng khớp"], "c": 0, "e": "Đau cơ học thì nghỉ ngơi giảm đau. Đau do viêm tự miễn thì càng nằm im càng ứ đọng dịch viêm, gây đau cứng lưng khi thức dậy."}, {"q": "Câu 35: Phẫu thuật là chỉ định tuyệt đối và khẩn cấp trong điều trị thoát vị đĩa đệm khi có biến chứng nào?", "a": ["A. Đau lưng kéo dài 2 tuần", "B. Hội chứng chùm đuôi ngựa hoặc liệt chi dưới (teo cơ, rớt bàn chân) tiến triển nhanh chóng", "C. Đau thần kinh tọa tái phát nhiều lần", "D. Bệnh nhân sợ tập vật lý trị liệu"], "c": 1, "e": "Chèn ép gây rối loạn cơ vòng hoặc liệt teo cơ là dấu hiệu thần kinh đang bị hoại tử, cần mổ cứu rễ ngay lập tức."}, {"q": "Câu 36: Cơ thắt lưng chậu (Iliopsoas) đóng vai trò gì trong sinh cơ học của đau cột sống thắt lưng?", "a": ["A. Là cơ duỗi sống lưng chính", "B. Cơ này bám từ cột sống thắt lưng xuống xương đùi; khi bị co rút, nó kéo ưỡn cột sống thắt lưng ra trước, gây đau thắt lưng mạn tính.", "C. Không liên quan đến cột sống thắt lưng", "D. Giúp gập cổ"], "c": 1, "e": "Người ngồi văn phòng nhiều làm cơ chậu thắt lưng bị co ngắn. Khi đứng thẳng, cơ này kéo giật đốt sống thắt lưng cong ra trước gây đau."}, {"q": "Câu 37: Cơ chế giảm đau của nhiệt nóng nông (Túi chườm nóng, sáp Paraffin) khác với nhiệt sâu ở điểm nào?", "a": ["A. Nhiệt nông đâm xuyên qua xương", "B. Nhiệt nông chỉ truyền nhiệt qua dẫn truyền trực tiếp vào lớp da và mô dưới da (độ sâu 1-2cm), tác động lên các thụ thể nhiệt ngoại vi", "C. Nhiệt nông gây đông máu", "D. Nhiệt nông lạnh hơn nhiệt sâu"], "c": 1, "e": "Nhiệt nông làm ấm da, tạo tín hiệu cạnh tranh với tín hiệu đau và giãn mạch bề mặt, không vào tới ổ khớp sâu."}, {"q": "Câu 38: Test nâng chân thẳng (SLR) ở chân KHÔNG ĐAU mà gây ra đau chói dọc chân ĐAU (Crossed SLR test dương tính) có ý nghĩa gì?", "a": ["A. Bệnh nhân giả vờ đau", "B. Độ đặc hiệu rất cao cho thoát vị đĩa đệm lớn chèn ép rễ thần kinh", "C. Viêm cơ thắt lưng", "D. Đứt gân gót"], "c": 1, "e": "Khi nâng chân lành, tủy sống bị dịch chuyển nhẹ. Nếu thoát vị đĩa đệm rất to, sự dịch chuyển này đủ để cọ sát rễ thần kinh bên bệnh gây đau chói."}, {"q": "Câu 39: Đai lưng hỗ trợ (Lumbar corset) nếu đeo liên tục nhiều tháng sẽ gây ra hậu quả gì?", "a": ["A. Cột sống thẳng vĩnh viễn", "B. Teo yếu hệ thống cơ cốt lõi (cơ lưng, cơ bụng) do cơ mất chức năng chống đỡ thụ động, làm cột sống yếu đi khi tháo đai", "C. Cột sống dài ra", "D. Chữa khỏi loãng xương"], "c": 1, "e": "Cơ thể sẽ ỷ lại vào đai lưng. Khi cơ bắp teo đi, cột sống mất \"corset tự nhiên\", rất dễ chấn thương nặng hơn nếu bỏ đai."}, {"q": "Câu 40: Nguyên tắc tập luyện \"Tăng tiến\" (Progressive) trong hoạt động trị liệu đau CSTL nghĩa là gì?", "a": ["A. Ngày nào cũng tập với mức tạ tối đa", "B. Bắt đầu bằng bài tập thụ động nhẹ nhàng, chuyển sang chủ động, rồi tăng dần cường độ, thời gian và kháng lực phù hợp với khả năng chịu đựng", "C. Chuyển ngay sang tập tạ sau khi hết đau", "D. Tập theo ý thích"], "c": 1, "e": "Tăng tiến từ từ giúp mô cơ-xương-khớp thích nghi dần, tái tạo sợi collagen mà không bị rách bục lại."}, {"q": "Câu 41: \"Viêm quanh khớp vai\" (VQKV) là thuật ngữ chỉ các bệnh lý tổn thương cấu trúc nào?", "a": ["A. Tổn thương sụn khớp và xương của khớp vai", "B. Tổn thương các phần mềm quanh khớp: gân, cơ, dây chằng, bao khớp", "C. Đứt dây thần kinh cánh tay", "D. Gãy xương đòn"], "c": 1, "e": "VQKV không bao gồm các tổn thương thực thể do chấn thương gãy xương, trật khớp hay viêm khớp nhiễm khuẩn."}, {"q": "Câu 42: Nhóm cơ \"Chóp xoay\" (Rotator cuff) bao gồm những cơ nào?", "a": ["A. Cơ nhị đầu, cơ tam đầu, cơ delta", "B. Cơ ngực lớn, cơ lưng rộng", "C. Cơ trên gai, cơ dưới gai, cơ tròn bé, cơ dưới vai", "D. Cơ quạ cánh tay, cơ thang"], "c": 2, "e": "Đây là 4 cơ bám quanh chỏm xương cánh tay, giữ vững khớp ổ chảo - cánh tay và thực hiện các động tác xoay."}, {"q": "Câu 43: Chức năng chính của cơ trên gai (Supraspinatus) là gì?", "a": ["A. Gấp khuỷu tay", "B. Khởi phát động tác dạng khớp vai (trong khoảng 15-30 độ đầu tiên)", "C. Duỗi vai ra sau", "D. Xoay trong khớp vai"], "c": 1, "e": "Cơ trên gai nằm ở hố trên gai xương bả vai, có vai trò kéo dang cánh tay lên cao."}, {"q": "Câu 44: Tổn thương thường gặp nhất trong Viêm quanh khớp vai thể Đơn thuần (Thông thường) là ở đâu?", "a": ["A. Gân cơ nhị đầu", "B. Gân cơ trên gai", "C. Bao khớp vai", "D. Cơ ngực lớn"], "c": 1, "e": "Gân cơ trên gai cọ xát nhiều nhất dưới vòm mỏm cùng vai nên rất dễ bị thoái hóa và viêm do vi chấn thương."}, {"q": "Câu 45: Thể Đông đặc (Frozen shoulder / Viêm dính bao khớp) có đặc điểm lâm sàng nổi bật nhất là gì?", "a": ["A. Sốt cao, khớp sưng to mưng mủ", "B. Khớp lỏng lẻo, dễ trật", "C. Hạn chế tầm vận động khớp vai ở TẤT CẢ các hướng, kể cả vận động chủ động và thụ động", "D. Chỉ đau khi dạng tay"], "c": 2, "e": "Bao khớp co rút, dày và dính chặt vào chỏm xương cánh tay, làm khớp bị \"đóng băng\" cứng ngắc."}, {"q": "Câu 46: VQKV Thể Cấp tính (Đau vai cấp) thường do nguyên nhân nào?", "a": ["A. Liệt dây thần kinh", "B. Viêm vi tinh thể do sự di trú của các canxi hóa từ gân chóp xoay vào bao hoạt dịch dưới mỏm cùng vai", "C. Ung thư xương", "D. Rách bao khớp"], "c": 1, "e": "Tinh thể canxi lắng đọng rơi vào túi hoạt dịch gây ra phản ứng viêm cấp tính sưng nóng đỏ đau cực kỳ dữ dội."}, {"q": "Câu 47: VQKV Thể Giả liệt (Pseudoparalytic) thực chất là bệnh lý gì?", "a": ["A. Nhồi máu não liệt nửa người", "B. Đứt hoàn toàn gân cơ chóp xoay (thường là gân cơ trên gai), bệnh nhân không thể tự nâng tay lên được", "C. Đứt dây thần kinh nách", "D. Gãy cổ xương cánh tay"], "c": 1, "e": "Gọi là \"giả liệt\" vì dây thần kinh vẫn bình thường, nhưng \"sợi dây kéo\" (gân cơ) bị đứt nên tay không nhấc lên được."}, {"q": "Câu 48: Bài tập quả lắc (Codman's pendulum exercise) nhằm mục đích gì?", "a": ["A. Tập tạ tăng sức mạnh bắp tay", "B. Lợi dụng trọng lượng cánh tay để tạo lực kéo dãn nhẹ nhàng, thư giãn bao khớp và giảm đau", "C. Khám thần kinh cổ", "D. Tạo cơ bụng"], "c": 1, "e": "Bệnh nhân cúi người, thả thỏng tay và đu đưa nhẹ nhàng. Đây là bài tập kinh điển, an toàn nhất trong giai đoạn đang đau."}, {"q": "Câu 49: Bài tập bò tường (Wall climbing) bằng ngón tay giúp phục hồi cử động nào của khớp vai?", "a": ["A. Xoay trong", "B. Tăng tầm vận động gập và dạng khớp vai lên cao", "C. Duỗi ra sau", "D. Khép tay vào ngực"], "c": 1, "e": "Các ngón tay lần bước trên tường giúp trợ giúp khớp vai từ từ nâng cánh tay lên cao một cách có kiểm soát."}, {"q": "Câu 50: Thần kinh nách (C5, C6) chi phối vận động cho nhóm cơ nào ở vùng vai?", "a": ["A. Cơ ngực lớn", "B. Cơ nhị đầu cánh tay", "C. Cơ Delta và cơ tròn bé", "D. Cơ thang"], "c": 2, "e": "Thần kinh nách quấn quanh cổ phẫu thuật xương cánh tay, phân nhánh vào cơ Delta giúp dạng vai mạnh."}, {"q": "Câu 51: Siêu âm trị liệu trong điều trị VQKV có tác dụng chính gì?", "a": ["A. Chụp hình X-quang khớp", "B. Giảm đau, giảm viêm sâu, làm mềm mô sẹo và chống dính gân cơ bao khớp", "C. Gây tê cục bộ", "D. Phẫu thuật cắt gân"], "c": 1, "e": "Nhiệt sâu từ siêu âm làm tăng chuyển hóa và độ đàn hồi của collagen trong các mô gân quanh vai bị xơ chai."}, {"q": "Câu 52: X-quang khớp vai ở bệnh nhân Viêm quanh khớp vai thông thường sẽ có hình ảnh gì?", "a": ["A. Hẹp khe khớp và gai xương", "B. Gãy xương", "C. Hoàn toàn bình thường (không có tổn thương xương sụn)", "D. Tiêu xương"], "c": 2, "e": "Vì bệnh lý chỉ nằm ở phần mềm (gân, cơ) nên X-quang xương khớp không thấy hình ảnh bất thường."}, {"q": "Câu 53: Cơ nào có chức năng Xoay trong (Internal rotation) khớp vai mạnh nhất?", "a": ["A. Cơ dưới gai", "B. Cơ tròn bé", "C. Cơ dưới vai (Subscapularis)", "D. Cơ trên gai"], "c": 2, "e": "Cơ dưới vai nằm áp sát mặt trước xương bả vai, đóng vai trò chính kéo xoay cánh tay vào trong."}, {"q": "Câu 54: Dấu hiệu lâm sàng nổi bật của đứt gân cơ trên gai (Thể giả liệt) là gì?", "a": ["A. Khớp vai sưng to như quả cam", "B. Bệnh nhân mất động tác dạng vai chủ động, nhưng khi người khám nâng tay bệnh nhân lên thì tầm vận động thụ động vẫn hoàn toàn bình thường", "C. Bệnh nhân cứng khớp hoàn toàn", "D. Đỏ rực mặt da"], "c": 1, "e": "Khớp không bị dính nên người khác đưa lên vẫn được (thụ động bình thường), nhưng tự đưa lên thì rớt xuống (chủ động mất)."}, {"q": "Câu 55: Bệnh nhân không thể đưa tay ra sau lưng để cài áo ngực hoặc lấy ví ở túi quần sau, nguyên nhân do hạn chế động tác nào?", "a": ["A. Gập vai", "B. Xoay trong và duỗi vai", "C. Xoay ngoài", "D. Dạng ngang"], "c":
