 1, "e": "Đưa tay ra sau mông đòi hỏi khớp vai phải xoay trong và đưa ra sau (duỗi). Đây là một trong các chức năng sinh hoạt dễ bị mất nhất."}, {"q": "Câu 56: Nghiệm pháp Rớt cánh tay (Drop Arm test) dương tính chỉ điểm tình trạng gì?", "a": ["A. Viêm bao hoạt dịch", "B. Đứt gân cơ chóp xoay (cơ trên gai)", "C. Viêm gân cơ nhị đầu", "D. Gãy xương đòn"], "c": 1, "e": "Bác sĩ nâng tay BN lên 90 độ dạng, yêu cầu BN giữ nguyên và hạ từ từ. Nếu rớt đánh \"bịch\" xuống là gân đã đứt không giữ được."}, {"q": "Câu 57: Diễn tiến tự nhiên của VQKV Thể Đông đặc (Frozen shoulder) trải qua 3 giai đoạn nào?", "a": ["A. Đau cấp -> Trật khớp -> Liệt", "B. Giai đoạn đóng băng (Đau nhiều) -> Giai đoạn đông đặc (Cứng khớp) -> Giai đoạn tan băng (Phục hồi dần)", "C. Phù nề -> Mưng mủ -> Teo cơ", "D. Cấp tính -> Bán cấp -> Ác tính"], "c": 1, "e": "Quá trình bệnh sinh kéo dài từ 1 đến 2 năm, đi từ tình trạng viêm đau dữ dội sang xơ hóa dính bao khớp, rồi dần giãn ra."}, {"q": "Câu 58: Ở VQKV Thể Đông đặc, cử động nào của khớp vai bị hạn chế đầu tiên và rõ rệt nhất?", "a": ["A. Gập (Đưa tay ra trước)", "B. Duỗi (Đưa tay ra sau)", "C. Xoay ngoài (External rotation)", "D. Xoay trong"], "c": 2, "e": "Theo đặc tính co rút bao khớp vai (Capsular pattern), cử động xoay ngoài luôn bị giới hạn nghiêm trọng nhất, sau đó là dạng và xoay trong."}, {"q": "Câu 59: Cơ chế của Hội chứng chạm (Impingement syndrome) tại khớp vai là gì?", "a": ["A. Gân cơ nhị đầu bị đứt", "B. Gân chóp xoay (đặc biệt gân cơ trên gai) và túi hoạt dịch bị kẹp/nghiến giữa mỏm cùng vai và chỏm xương cánh tay khi dạng tay lên cao", "C. Khớp vai trật ra trước", "D. U xương chèn ép"], "c": 1, "e": "Khe dưới mỏm cùng vai rất hẹp. Khi gân cơ trên gai bị phù nề hoặc có gai xương, cử động dang tay sẽ nghiến nát gân gây đau nhói."}, {"q": "Câu 60: Kỹ thuật Di động khớp (Joint mobilization) trong PHCN khớp vai được áp dụng với mục đích chính là gì?", "a": ["A. Tăng sức mạnh cơ bắp", "B. Kéo trượt các mặt sụn khớp lên nhau để kéo dãn bao khớp bị co rút, tăng tầm vận động thụ động", "C. Giảm sốt", "D. Tập thăng bằng"], "c": 1, "e": "Là kỹ thuật vật lý trị liệu dùng tay trượt nhẹ chỏm xương cánh tay trong ổ chảo để phá vỡ các mảng xơ dính bao khớp."}, {"q": "Câu 61: Cơ tròn bé (Teres minor) và cơ dưới gai (Infraspinatus) có chung chức năng gì?", "a": ["A. Xoay trong khớp vai", "B. Xoay ngoài (External rotation) khớp vai", "C. Gập khớp vai", "D. Nâng xương bả vai"], "c": 1, "e": "Hai cơ này bám vào củ lớn xương cánh tay phía sau, có lực kéo làm chỏm xương xoay ra ngoài."}, {"q": "Câu 62: Cơ nhị đầu cánh tay (Biceps brachii) ngoài việc gấp khuỷu tay còn có chức năng gì đối với khớp vai?", "a": ["A. Duỗi vai mạnh", "B. Đầu dài gân cơ nhị đầu vắt qua rãnh nhị đầu, hỗ trợ gập vai và ấn chỏm xương cánh tay vào ổ chảo để giữ vững khớp", "C. Xoay ngoài vai", "D. Dạng vai"], "c": 1, "e": "Đầu dài cơ nhị đầu cũng là một gân nằm trong bao khớp vai, hay bị viêm kèm theo chóp xoay (Viêm gân nhị đầu)."}, {"q": "Câu 63: Chườm lạnh (Cryotherapy) được ưu tiên hơn chườm nóng trong trường hợp nào của VQKV?", "a": ["A. Giai đoạn mãn tính, cứng khớp", "B. Thể đông đặc", "C. Thể cấp tính (Đau vai cấp), khớp đang sưng tấy, đau dữ dội, viêm cấp", "D. Teo cơ"], "c": 2, "e": "Đá lạnh gây co mạch, giảm phù nề và phong bế thần kinh cảm giác, giúp giảm đau nhanh nhất trong cơn viêm cấp."}, {"q": "Câu 64: Dấu hiệu lâm sàng của Viêm gân cơ nhị đầu là gì?", "a": ["A. Đau nhói mặt sau vai", "B. Đau chói ở mặt trước vai, dọc theo rãnh gian củ (rãnh nhị đầu), đau tăng khi gập khuỷu hoặc ngửa bàn tay có sức cản", "C. Đau tê các ngón tay", "D. Khớp vai sưng đỏ"], "c": 1, "e": "Gân nhị đầu trượt trong rãnh mặt trước xương cánh tay. Test Yergason hoặc Speed (+) giúp chẩn đoán viêm gân này."}, {"q": "Câu 65: Trong giai đoạn Cứng khớp (Mãn tính) của VQKV, ưu tiên PHCN hàng đầu là gì?", "a": ["A. Bất động tay hoàn toàn bằng đai treo", "B. Chườm lạnh liên tục", "C. Dùng nhiệt nóng sâu (siêu âm, sóng ngắn) kết hợp kéo dãn thụ động, di động khớp để tăng tầm vận động", "D. Uống thuốc kháng sinh"], "c": 2, "e": "Ở giai đoạn mãn tính, tình trạng viêm đã thoái lui, rào cản chính là bao khớp xơ cứng cần phải làm nóng và kéo dãn để bung ra."}, {"q": "Câu 66: Dụng cụ ròng rọc (Pulley exercises) giúp bệnh nhân VQKV tập luyện theo cơ chế nào?", "a": ["A. Tập kháng lực bằng tạ", "B. Tập chủ động có trợ giúp: Dùng sức của tay LÀNH kéo dây ròng rọc để nâng tay ĐAU lên cao, giúp tăng tầm vận động mà không làm cơ bên đau bị quá tải", "C. Treo tay lên trần nhà", "D. Đo nhịp tim"], "c": 1, "e": "Ròng rọc giúp kéo dãn bao khớp nhẹ nhàng do chính bệnh nhân kiểm soát mức độ đau bằng tay kia."}, {"q": "Câu 67: Test cung đau (Painful arc) dương tính có biểu hiện như thế nào?", "a": ["A. Bệnh nhân đau suốt từ 0 đến 180 độ", "B. Đau chói khi dạng tay trong khoảng từ 60 độ đến 120 độ, sau đó lên cao hơn lại hết đau", "C. Đau khi hạ tay xuống", "D. Không thể đưa tay quá 30 độ"], "c": 1, "e": "60-120 độ là góc mà gân cơ trên gai bị mỏm cùng vai ép chặt nhất. Qua khỏi góc này gân trượt qua được khe hẹp nên hết đau."}, {"q": "Câu 68: Tổn thương dây thần kinh ngực dài (chi phối cơ răng trước) sẽ gây ra dấu hiệu gì cản trở vận động vai?", "a": ["A. Xương bả vai hình cánh chim (Scapular winging), xương bả vai nhô gồ lên mặt lưng", "B. Rớt cánh tay", "C. Cứng khớp ổ chảo cánh tay", "D. Đứt gân nhị đầu"], "c": 0, "e": "Cơ răng trước giữ xương bả vai ép sát vào lồng ngực. Liệt cơ này làm xương bả vai bung ra như cánh chim, gây mất trụ bám cho cử động vai."}, {"q": "Câu 69: Bài tập vận động với gậy (Wand exercises) có ưu điểm gì?", "a": ["A. Gậy nặng giúp tăng cơ bắp nhanh", "B. Dùng 2 tay nắm gậy giúp tay lành dẫn dắt, định hướng và trợ giúp tay đau thực hiện các động tác gập, duỗi, xoay với tầm độ đồng đều", "C. Để gõ vào các vùng cơ co thắt", "D. Chỉ dùng cho người mù"], "c": 1, "e": "Thanh gậy tạo thành đòn bẩy cơ học, tay tốt sẽ đẩy gậy để kéo tay đau di chuyển một cách vững chắc."}, {"q": "Câu 70: Tiêm Corticosteroid tại chỗ vào quanh khớp vai được chỉ định hiệu quả nhất trong trường hợp nào?", "a": ["A. Đứt gân cơ chóp xoay hoàn toàn", "B. Đau vai cấp do viêm vi tinh thể hoặc viêm túi hoạt dịch dữ dội không đáp ứng NSAIDs", "C. Thoái hóa xương sụn nặng", "D. Gãy xương"], "c": 1, "e": "Corticosteroid là thuốc chống viêm mạnh, tiêm đúng vào túi hoạt dịch viêm sẽ cắt cơn đau cấp tính cực nhanh để bệnh nhân bắt đầu tập vật lý trị liệu."}, {"q": "Câu 71: Tại sao trong điều trị VQKV thể đông đặc, kỹ thuật viên PHCN phải đặc biệt chú trọng tập \"trượt chỏm xương cánh tay xuống dưới\" (Inferior glide)?", "a": ["A. Vì làm vậy cho bệnh nhân dễ chịu", "B. Vì để tay có thể dạng lên cao, cơ sinh học bắt buộc chỏm xương cánh tay phải trượt xuống dưới; nếu bao khớp dưới bị dính, chỏm xương sẽ kẹt và đập vào mỏm cùng vai gây Impingement.", "C. Để chữa đứt gân", "D. Để lắp khớp giả"], "c": 1, "e": "Khi cánh tay đưa lên, chỏm cầu phải lăn và trượt xuống dưới. Bao khớp nách hay bị dính nhất, ngăn cản sự trượt này, làm tay kẹt ở góc 90 độ."}, {"q": "Câu 72: Cơ dưới vai (Subscapularis) được khám đặc hiệu bằng nghiệm pháp nào sau đây?", "a": ["A. Drop arm test", "B. Neer impingement test", "C. Nghiệm pháp Gerber (Lift-off test - Bệnh nhân để tay sau mông và cố đẩy bàn tay ra khỏi lưng)", "D. Yergason test"], "c": 2, "e": "Đưa tay ra sau lưng là tư thế xoay trong tối đa. Cố đẩy tay ra xa khỏi lưng dùng sức mạnh đặc hiệu của cơ dưới vai."}, {"q": "Câu 73: Trong bài tập tăng sức mạnh cơ chóp xoay, tại sao phải chú trọng tập mạnh cơ XOAY NGOÀI nhiều hơn cơ xoay trong?", "a": ["A. Vì cơ xoay ngoài đẹp hơn", "B. Vì nhóm cơ xoay trong (ngực lớn, lưng rộng) vốn dĩ đã rất mạnh, trong khi nhóm cơ xoay ngoài (tròn bé, dưới gai) nhỏ và yếu. Sự mất cân bằng này làm chỏm xương bị kéo vặn ra trước gây chấn thương.", "C. Vì cơ xoay trong không thể tập được", "D. Vì không có bài tập xoay trong"], "c": 1, "e": "Củng cố sức mạnh nhóm cơ xoay ngoài (nhóm cơ yếu thế) giúp kéo chỏm xương cánh tay lùi ra sau, mở rộng khoảng trống dưới mỏm cùng vai, giảm ma sát gân."}, {"q": "Câu 74: Làm thế nào để phân biệt VQKV thể đông đặc (Viêm dính bao khớp) với Thoái hóa khớp vai trên lâm sàng và X-quang?", "a": ["A. Thể đông đặc X-quang bình thường, thoái hóa có hẹp khe khớp và gai xương; thoái hóa thường có tiếng lạo xạo khớp.", "B. Thể đông đặc có gai xương, thoái hóa thì không.", "C. Cả hai đều không đau.", "D. Thể đông đặc luôn kèm gãy xương."], "c": 0, "e": "VQKV thuần túy là bệnh của mô mềm, sụn và xương ổ chảo vẫn trơn láng. Thoái hóa là hư sụn khớp nên cọ xát sẽ kêu lục cục và X-quang thấy hư hại xương."}, {"q": "Câu 75: Kỹ thuật tập PNF (Tạo thuận thần kinh cơ cảm thụ bản thể) mẫu D2 Gập chi trên (Rút gươm) có tác dụng gì?", "a": ["A. Chỉ để kéo giãn cơ nhị đầu", "B. Kết hợp đồng thời ba cử động: gập, dạng, xoay ngoài, giúp tái lập các đường dẫn truyền thần kinh cơ cho các hoạt động chức năng chéo trong sinh hoạt (VD: chải đầu, lấy đồ trên kệ cao).", "C. Để bệnh nhân làm nóng cơ thể", "D. Tập cho khớp cổ tay"], "c": 1, "e": "PNF là kỹ thuật tập theo các đường chéo ốc xoắn mô phỏng lại các cử động tự nhiên nhất của con người trong đời sống hàng ngày."}, {"q": "Câu 76: \"Nhịp vai - lồng ngực\" (Scapulohumeral rhythm) có tỷ lệ bình thường là bao nhiêu khi dạng vai trên 30 độ?", "a": ["A. 1:1", "B. Khớp ổ chảo-cánh tay chuyển động 2 độ thì xương bả vai xoay 1 độ (Tỷ lệ 2:1)", "C. Khớp ổ chảo chuyển động 1 độ thì xương bả vai xoay 3 độ", "D. Xương bả vai đứng im"], "c": 1, "e": "Để đưa tay lên thẳng 180 độ, khớp cánh tay đóng góp 120 độ, xương bả vai xoay lên đóng góp 60 độ."}, {"q": "Câu 77: Ở bệnh nhân VQKV, tại sao cơn đau thường có đặc điểm tăng lên dữ dội về ban đêm?", "a": ["A. Vì ban đêm có nhiều vi khuẩn", "B. Tư thế nằm làm các gân cơ chóp xoay bị đè ép, giảm tuần hoàn máu (vốn dĩ vùng gân chóp xoay đã có 1 \"vùng tới máu kém\" - critical zone) làm chất viêm ứ đọng gây đau.", "C. Do ban đêm bệnh nhân hay mộng du", "D. Do nhiệt độ ban đêm quá nóng"], "c": 1, "e": "Vùng bám gân cơ trên gai rất nghèo nàn mạch máu. Nằm ngủ làm lực tưới máu giảm sút, dồn ứ các cytokine viêm gây đau nhức nhối làm mất ngủ."}, {"q": "Câu 78: Sau phẫu thuật khâu đứt gân chóp xoay (điều trị VQKV thể giả liệt), nguyên tắc phục hồi chức năng trong 4-6 tuần đầu tiên là gì?", "a": ["A. Bắt bệnh nhân tập nâng tạ ngay để không teo cơ", "B. Bất động khớp vai bằng đai mang tay để bảo vệ mối khâu gân, CHỈ cho phép tập vận động THỤ ĐỘNG nhẹ nhàng để tránh dính khớp.", "C. Tháo đai và bơi lội tự do", "D. Chườm nóng liên tục 24/24"], "c": 1, "e": "Nếu tập chủ động (cơ tự co rút) sẽ làm bứt đứt chỉ khâu gân vừa mổ. Tập thụ động (người khác làm) giúp cơ được nghỉ ngơi mà khớp vẫn không bị đông cứng."}, {"q": "Câu 79: Nếu lạm dụng tiêm Corticosteroid nội khớp quá nhiều lần (nhiều mũi trong thời gian ngắn) ở bệnh nhân VQKV, nguy cơ tai biến nghiêm trọng nhất là gì?", "a": ["A. Tăng chiều cao", "B. Làm thoái hóa, đứt gân chóp xoay tự phát, xói mòn sụn khớp và teo mô mỡ dưới da tại chỗ.", "C. Gây điếc", "D. Giãn tĩnh mạch"], "c": 1, "e": "Corticoid phá hủy cấu trúc collagen. Chích nhiều làm gân bị \"mủn\" ra, rất dễ đứt đột ngột khi xách vật nặng."}, {"q": "Câu 80: Tác dụng của dòng điện Giao thoa (Interferential current) trong điều trị Viêm quanh khớp vai là gì?", "a": ["A. Kích thích cơ tim", "B. Giao thoa hai dòng điện trung tần tạo ra dòng điện tần số thấp ở sâu trong khớp, giúp kích thích thần kinh cơ, giảm đau mạnh và thấm sâu hơn TENS.", "C. Dùng để mổ cắt bao khớp", "D. Chữa gãy xương"], "c": 1, "e": "Cấu tạo khớp vai có rất nhiều cơ dày bao bọc. Điện giao thoa có khả năng xuyên thấu sâu vào tận ổ khớp để giảm đau và giảm viêm mà không gây bỏng rát da bề mặt."}, {"q": "Câu 1: Gãy cổ xương đùi được định nghĩa là loại gãy xương ở vị trí nào?", "a": ["A. Ở thân xương đùi", "B. Giữa chỏm xương đùi và khối mấu chuyển", "C. Ở lồi cầu đùi", "D. Ở ổ cối xương chậu"], "c": 1, "e": "Theo giải phẫu, cổ xương đùi là phần nối hẹp nằm giữa chỏm cầu xương đùi và hai khối mấu chuyển (lớn và bé)."}, {"q": "Câu 2: Góc tạo bởi cổ xương đùi và thân xương đùi bình thường trên bình diện thẳng là bao nhiêu?", "a": ["A. 90° - 100°", "B. 125° - 130°", "C. 150° - 160°", "D. 180°"], "c": 1, "e": "Góc nghiêng sinh lý 125°-130° giúp phân tán lực trọng trường từ thân mình truyền xuống chân."}, {"q": "Câu 3: \"Tam giác Ward\" ở cổ xương đùi là gì?", "a": ["A. Là vùng mạch máu nuôi chỏm", "B. Là điểm bám của dây chằng", "C. Là điểm yếu ở cổ xương đùi nằm giữa hai hệ thống bè xương (hệ bè quạt và hệ cung nhọn)", "D. Là vùng sụn khớp"], "c": 2, "e": "Tam giác Ward là vùng thưa thớt các bè xương đan chéo, là nơi chịu lực kém nhất và dễ gãy nhất khi có chấn thương."}, {"q": "Câu 4: Đối tượng nào có nguy cơ gãy cổ xương đùi cao nhất?", "a": ["A. Nam giới trẻ tuổi", "B. Trẻ em đang phát triển", "C. Nữ giới, cao tuổi, có loãng xương", "D. Phụ nữ mang thai"], "c": 2, "e": "Loãng xương sau mãn kinh làm xương giòn xốp, kết hợp sự giảm thăng bằng ở người già khiến nữ giới cao tuổi chiếm tỷ lệ gãy lớn nhất."}, {"q": "Câu 5: Triệu chứng lâm sàng kinh điển của gãy cổ xương đùi (có di lệch) khi bệnh nhân nằm ngửa là gì?", "a": ["A. Chân bên gãy dài hơn chân lành, bàn chân xoay trong", "B. Chân bên gãy ngắn hơn chân lành, bàn chân xoay ngoài đổ sát mặt giường", "C. Hai chân bằng nhau, gập gối sát bụng", "D. Chân co cứng, không thể duỗi"], "c": 1, "e": "Mất sự chống đỡ của cổ xương đùi làm cơ bị kéo co rút (chiều dài chân ngắn lại) và trọng lượng bàn chân đổ xoay ra ngoài."}, {"q": "Câu 6: Nguồn cung cấp máu quan trọng nhất nuôi chỏm xương đùi ở người trưởng thành là gì?", "a": ["A. Động mạch đùi nông", "B. Các nhánh bao khớp từ vòng động mạch mũ đùi (trong và ngoài)", "C. Động mạch dây chằng tròn", "D. Động mạch chậu ngoài"], "c": 1, "e": "Vòng động mạch mũ cung cấp 80% máu nuôi chỏm. Gãy cổ xương đùi dễ làm đứt các mạch máu này gây hoại tử chỏm."}, {"q": "Câu 7: Biến chứng đáng sợ nhất tại chỗ của gãy cổ xương đùi là gì?", "a": ["A. Thoái hóa khớp gối", "B. Hoại tử vô mạch chỏm xương đùi và khớp giả (không liền xương)", "C. Tổn thương thần kinh tọa", "D. Đứt gân cơ tứ đầu đùi"], "c": 1, "e": "Do gãy làm đứt mạch máu nuôi, chỏm xương đùi thiếu máu sẽ hoại tử (chết), gây xẹp chỏm và không thể liền xương."}, {"q": "Câu 8: Đối với bệnh nhân già yếu gãy cổ xương đùi có di lệch nhiều (Garden 3, 4), phương pháp điều trị ngoại khoa phổ biến nhất hiện nay là gì?", "a": ["A. Kéo tạ liên tục 3 tháng", "B. Bó bột chậu lưng chân", "C. Phẫu thuật thay khớp háng (bán phần hoặc toàn phần)", "D. Uống thuốc liền xương"], "c": 2, "e": "Người già xương xốp, khả năng liền xương kém và không chịu được nằm bất động lâu, nên thay khớp háng để cho phép vận động sớm."}, {"q": "Câu 9: Chống chỉ định của phẫu thuật thay khớp háng là gì?", "a": ["A. Bệnh nhân trên 80 tuổi", "B. Bệnh nhân bị tiểu đường", "C. Bệnh nhân có tình trạng nhiễm trùng tiến triển", "D. Bệnh nhân bị loãng xương"], "c": 2, "e": "Khớp nhân tạo là dị vật, nếu mổ trên nền đang có nhiễm trùng sẽ gây nhiễm trùng khớp mạn tính rất nguy hiểm."}, {"q": "Câu 10: Nguyên tắc VÀNG về tư thế để tránh trật khớp sau phẫu thuật thay khớp háng nhân tạo là CẤM động tác nào?", "a": ["A. Gập háng quá 90 độ, khép háng (bắt chéo chân) và xoay trong", "B. Duỗi háng, dạng háng, xoay ngoài", "C. Gập gối, gập cổ chân", "D. Đứng thẳng chịu lực"], "c": 0, "e": "Động tác gập sâu, khép và xoay trong sẽ đẩy chỏm khớp nhân tạo trượt ra phía sau và trật ra khỏi ổ cối."}, {"q": "Câu 11: Sau mổ thay khớp háng, khi nằm ngủ bệnh nhân nên đặt gối ở vị trí nào để bảo vệ khớp?", "a": ["A. Dưới lưng", "B. Kê gối tam giác (hoặc gối to) kẹp GIỮA hai chân để giữ hai chân luôn dạng ra", "C. Dưới đầu gối bên mổ", "D. Không cần kê gối"], "c": 1, "e": "Gối chêm giữa hai chân ngăn chặn tình trạng bệnh nhân vô tình khép chân hoặc vắt chéo chân lúc ngủ say gây trật khớp."}, {"q": "Câu 12: Khi tập bước lên - xuống cầu thang cho bệnh nhân sau mổ thay khớp háng, nguyên tắc bước chân là gì?", "a": ["A. Lên bằng chân mổ trước, xuống bằng chân lành trước", "B. Bước cả 2 chân cùng lúc", "C. Lên bằng chân lành trước, xuống bằng chân mổ trước", "D. Lên xuống bằng chân nào cũng được"], "c": 2, "e": "Câu thần chú \"Lên Tốt - Xuống Xấu\": Lên cầu thang dùng chân LÀNH bước lên trước để chịu lực kéo cơ thể; Xuống dùng chân MỔ bước xuống trước."}, {"q": "Câu 13: Mục tiêu của Phục hồi chức năng giai đoạn ĐẦU sau mổ (1-2 ngày đầu) là gì?", "a": ["A. Chạy bộ trên máy", "B. Ngăn ngừa các biến chứng do nằm lâu (loét, huyết khối tĩnh mạch sâu, viêm phổi)", "C. Phục hồi hoàn toàn tầm vận động", "D. Tập squat"], "c": 1, "e": "Vận động sớm tại giường (tập thở, cử động cổ chân bơm máu) giúp tránh các tai biến sinh tử do bất động hậu phẫu."}, {"q": "Câu 14: Dụng cụ trợ giúp đi lại nào thường được sử dụng trong những tuần đầu sau mổ thay khớp háng?", "a": ["A. Xe lăn điện", "B. Khung tập đi (Walker) hoặc nạng nách", "C. Nạng khuỷu (Lofstrand)", "D. Gậy 1 chân"], "c": 1, "e": "Khung tập đi cung cấp sự vững chắc tối đa và diện chân đế rộng, an toàn nhất cho bệnh nhân chưa lấy lại thăng bằng."}, {"q": "Câu 15: Để tránh gập háng quá 90 độ khi ngồi, bệnh nhân sau thay khớp háng cần lưu ý điều gì?", "a": ["A. Chỉ ngồi trên nệm mềm lún", "B. Ngồi ghế cao (đầu gối phải thấp hơn háng), dùng bồn cầu nâng cao", "C. Ngồi xổm hoặc ngồi bệt dưới đất", "D. Ngồi ghế có chỗ gác chân cao lên"], "c": 1, "e": "Ghế thấp hoặc bồn cầu thấp làm góc gập giữa đùi và thân mình nhọn lại (<90 độ), đẩy chỏm khớp ra khỏi ổ cối."}, {"q": "Câu 16: Bảng phân loại Garden dùng cho gãy cổ xương đùi dựa trên tiêu chí nào?", "a": ["A. Vị trí gãy trên cổ xương đùi (gãy sát chỏm, giữa cổ, nền cổ)", "B. Góc tạo bởi đường gãy và mặt phẳng ngang", "C. Mức độ di lệch của các bè xương trên phim X-quang", "D. Tình trạng loãng xương"], "c": 2, "e": "Phân loại Garden (1 đến 4) đánh giá độ di lệch, trong đó Garden 1,2 là chưa di lệch/di lệch ít; Garden 3,4 là di lệch nhiều."}, {"q": "Câu 17: Bảng phân loại Pauwels đánh giá mức độ gãy cổ xương đùi dựa trên tiêu chí nào?", "a": ["A. Độ lệch của bè xương", "B. Góc của đường gãy so với đường ngang", "C. Kích thước chỏm xương", "D. Độ tổn thương mạch máu"], "c": 1, "e": "Góc Pauwels càng lớn (đường gãy càng thẳng đứng, VD Pauwels 3 > 50° hoặc 70°) thì lực xé (trượt) càng mạnh, xương càng khó liền."}, {"q": "Câu 18: Tại sao gãy sát chỏm (Dưới sụn khớp) lại có tiên lượng xấu nhất về mặt liền xương?", "a": ["A. Vì xương ở đó rất mỏng", "B. Vì làm đứt toàn bộ các mạch máu nuôi đi từ dưới cổ lên chỏm, nguy cơ hoại tử vô mạch gần 100%", "C. Vì không thể phẫu thuật được", "D. Vì bệnh nhân rất đau"], "c": 1, "e": "Gãy càng gần chỏm thì nguồn cấp máu từ vòng động mạch mũ bị cắt đứt hoàn toàn, chỏm không có máu nuôi sẽ chết."}, {"q": "Câu 19: Phương pháp Xuyên đinh/Bắt vít xốp (Kết hợp xương) thường được chỉ định cho nhóm đối tượng nào?", "a": ["A. Bệnh nhân > 80 tuổi, gãy Garden 4", "B. Bệnh nhân trẻ tuổi, gãy không di lệch hoặc di lệch ít (Garden 1, 2)", "C. Bệnh nhân ung thư xương", "D. Bệnh nhân lao khớp háng"], "c": 1, "e": "Ở người trẻ, mạch máu tốt và xương đặc, ưu tiên giữ lại khớp thật (kết hợp xương) để tránh phải thay khớp nhân tạo sớm."}, {"q": "Câu 20: Dáng đi Trendelenburg sau phẫu thuật khớp háng xảy ra do nguyên nhân cơ sinh học nào?", "a": ["A. Yếu cơ tứ đầu đùi", "B. Yếu cơ mông trung (Gluteus medius) / cơ dạng háng bên chân trụ", "C. Chân mổ dài hơn chân lành", "D. Khớp háng bị cứng"], "c": 1, "e": "Cơ mông trung giữ khung chậu không bị xệ xuống khi đứng 1 chân. Yếu cơ này làm khung chậu bên đối diện tụt xuống tạo thành dáng đi lảo đảo."}, {"q": "Câu 21: Làm thế nào để khắc phục dáng đi Trendelenburg trong Phục hồi chức năng?", "a": ["A. Tập bơi lội", "B. Tập trung các bài tập dạng háng có kháng lực để làm mạnh nhóm cơ mông trung", "C. Cắt bớt xương chân lành", "D. Đi xe lăn vĩnh viễn"], "c": 1, "e": "Tái huấn luyện sức mạnh cơ dạng (cơ mông trung) sẽ giúp cố định được khung chậu khi bước đi."}, {"q": "Câu 22: Để phòng ngừa biến chứng \"Co rút gấp háng\" (Hip flexion contracture) sau mổ, cần LƯU Ý ĐẶC BIỆT điều gì khi chăm sóc bệnh nhân tại giường?", "a": ["A. Tránh kê gối dưới nhượng chân (khoeo gối) trong thời gian dài", "B. Luôn nâng cao đầu giường 90 độ", "C. Treo tạ kéo chân liên tục", "D. Bó bột chân mổ"], "c": 0, "e": "Kê gối dưới khoeo làm háng và gối ở tư thế gập liên tục. Cơ thắt lưng chậu sẽ bị co rút lại, sau này bệnh nhân không thể đứng thẳng lưng được."}, {"q": "Câu 23: Khám bằng nghiệm pháp nào giúp phát hiện tình trạng Co rút cơ gập háng?", "a": ["A. Nghiệm pháp Schober", "B. Nghiệm pháp Thomas (Thomas test)", "C. Nghiệm pháp Lasègue", "D. Nghiệm pháp Yergason"], "c": 1, "e": "Bệnh nhân nằm ngửa, gập một gối ép sát bụng. Nếu chân còn lại bị nhấc hổng lên khỏi mặt giường, chứng tỏ cơ gập háng chân đó bị co rút."}, {"q": "Câu 24: Bệnh nhân sau thay khớp háng có được phép cúi xuống nhặt đồ vật dưới đất không?", "a": ["A. Có, cúi tự do", "B. KHÔNG được cúi gập lưng sát đất (gập háng >90 độ). Cần dùng kẹp (Reacher/Grabber) để gắp đồ", "C. Có, nhưng phải nhắm mắt", "D. Có, đứng chéo chân để cúi"], "c": 1, "e": "Dùng gậy gắp đồ (Reacher) là dụng cụ trợ giúp bắt buộc trong Hoạt động trị liệu (OT) để bệnh nhân tự lập mà không phạm lệnh gập háng."}, {"q": "Câu 25: Tác dụng của bài tập gồng cơ tĩnh (Isometric exercises) như gồng cơ tứ đầu, gồng cơ mông trong những ngày đầu sau mổ là gì?", "a": ["A. Làm to cơ bắp gấp đôi", "B. Tăng sức ép làm liền xương nhanh", "C. Duy trì trương lực cơ, giảm phù nề và bơm máu tĩnh mạch về tim mà không gây chuyển động làm đau khớp mổ", "D. Khởi động để chạy bộ"], "c": 2, "e": "Gồng cơ không làm thay đổi chiều dài cơ, an toàn tuyệt đối cho khớp vừa phẫu thuật mà vẫn chống được teo cơ và huyết khối."}, {"q": "Câu 26: Bài tập trượt gót (Heel slides) được thực hiện với mục đích gì?", "a": ["A. Tập dạng háng", "B. Tập gập - duỗi khớp gối và khớp háng trong giới hạn an toàn để duy trì tầm vận động", "C. Tập cơ bụng", "D. Tập cổ chân"], "c": 1, "e": "Bệnh nhân nằm ngửa, từ từ trượt gót chân sát mặt giường kéo về phía mông, giúp vận động háng và gối nhẹ nhàng, không gây quá tải."}, {"q": "Câu 27: Việc \"Mang vớ y khoa áp lực\" (Compression stockings) cho bệnh nhân gãy cổ xương đùi nhằm mục đích dự phòng biến chứng nào?", "a": ["A. Nhiễm trùng vết mổ", "B. Huyết khối tĩnh mạch sâu chi dưới (DVT)", "C. Teo cơ", "D. Cứng khớp"], "c": 1, "e": "Vớ áp lực tạo lực ép liên tục lên tĩnh mạch, kết hợp bơm máu về tim để máu không bị đông lại ở chân khi nằm bất động."}, {"q": "Câu 28: Trong điều trị bảo tồn (bệnh nhân quá yếu không thể phẫu thuật), biện pháp nào thường được sử dụng để chống đau và giữ trục chân?", "a": ["A. Tập yoga", "B. Mang nẹp chống xoay hoặc kéo liên tục với tạ nhẹ", "C. Châm cứu", "D. Uống thuốc ngủ"], "c": 1, "e": "Nẹp chống xoay (giày chống xoay) hoặc kéo tạ giúp giữ chân không bị đổ xoay ngoài, giảm ma sát các mảnh gãy gây đau đớn cho người bệnh."}, {"q": "Câu 29: Trước khi cho bệnh nhân tập đứng dậy lần đầu tiên sau mổ, cần kiểm tra và chú ý biến chứng gì?", "a": ["A. Hạ đường huyết", "B. Hạ huyết áp tư thế đứng (do nằm lâu), có thể gây chóng mặt, ngất và té ngã", "C. Đau dạ dày", "D. Sốt cao"], "c": 1, "e": "Bệnh nhân lớn tuổi nằm nhiều ngày khi thay đổi tư thế đột ngột rất dễ bị tụt huyết áp. Cần cho bệnh nhân ngồi dập dình ở mép giường trước khi đứng."}, {"q": "Câu 30: Mục đích của Phục hồi chức năng giai đoạn xuất viện về nhà là gì?", "a": ["A. Nằm bất động tuyệt đối tại nhà", "B. Giúp bệnh nhân đạt được sự độc lập tối đa trong sinh hoạt (ADL), dùng gậy/khung tập đi an toàn tại cộng đồng", "C. Ngừng toàn bộ bài tập", "D. Đợi bác sĩ đến tiêm thuốc"], "c": 1, "e": "Mục tiêu dài hạn là hòa nhập, bệnh nhân tự làm được các việc vệ sinh, ăn uống và đi lại an toàn quanh nhà."}, {"q": "Câu 31: Sự khác biệt về đường mổ trong Thay khớp háng (Đường mổ lối sau - Posterior approach vs Đường mổ lối trước - Anterior approach) ảnh hưởng thế nào đến hướng dẫn phòng ngừa trật khớp?", "a": ["A. Không có gì khác biệt", "B. Đường mổ SAU cấm gập >90°, khép, xoay TRONG. Đường mổ TRƯỚC cấm duỗi quá mức và xoay NGOÀI.", "C. Đường mổ sau cấm xoay ngoài", "D. Cấm đi lại với cả hai đường mổ"], "c": 1, "e": "Đường mổ rạch qua nhóm cơ/bao khớp nào thì vách đó sẽ yếu. Mổ lối sau thì dễ trật ra sau (do gập, xoay trong), mổ lối trước dễ trật ra trước (do duỗi, xoay ngoài)."}, {"q": "Câu 32: Trong kỹ thuật tập chịu sức nặng (Weight-bearing) cho bệnh nhân kết hợp xương (Bắt vít) so với bệnh nhân thay khớp nhân tạo có gì khác biệt?", "a": ["A. Cả hai đều cho đi lại ngay", "B. Thay khớp nhân tạo (dùng xi măng) cho phép chịu sức nặng hoàn toàn (FWB) rất sớm. Kết hợp xương (giữ xương thật) phải HẠN CHẾ chịu lực (NWB/PWB) nhiều tuần để chờ can xương liền.", "C. Thay khớp háng phải nằm liệt 3 tháng", "D. Không ai được phép chạm chân xuống đất"], "c": 1, "e": "Khớp nhân tạo xi măng vững chắc ngay lập tức. Còn xương gãy được bắt vít thì rất yếu, nếu đè lực lên ngay vít sẽ xé toạc xương giòn."}, {"q": "Câu 33: Hoại tử vô mạch chỏm xương đùi (AVN) sau kết hợp xương thường có biểu hiện muộn trên X-quang và lâm sàng vào thời điểm nào?", "a": ["A. Ngay trong ngày đầu tiên", "B. Sau 1 tuần", "C. Vài tháng đến 1-2 năm sau (bệnh nhân đau háng trở lại, đi khập khiễng, X-quang xẹp/biến dạng chỏm)", "D. Sau 20 năm"], "c": 2, "e": "Xương chết (hoại tử) không tiêu đi ngay mà sẽ xẹp lún dần theo thời gian chịu lực, gây thoái hóa khớp thứ phát và đau dữ dội."}, {"q": "Câu 34: Phương pháp lượng giá chiều dài 2 chân (Leg length discrepancy) ở bệnh nhân gãy cổ xương đùi được đo lâm sàng từ mốc giải phẫu nào?", "a": ["A. Từ rốn đến ngón cái", "B. Từ gai chậu trước trên (ASIS) đến mắt cá trong", "C. Từ sụn chêm đến gót", "D. Từ khớp mu đến gối"], "c": 1, "e": "Đo chiều dài tuyệt đối của chi dưới là khoảng cách từ gai chậu trước trên (mốc cố định của khung chậu) đến đỉnh mắt cá trong."}, {"q": "Câu 35: Yếu tố quan trọng nào trong \"Tiếp cận đa ngành\" giúp giảm tỷ lệ tử vong 1 năm sau gãy cổ xương đùi ở người cao tuổi?", "a": ["A. Phẫu thuật thật lâu", "B. Sự phối hợp giữa BS Chấn thương chỉnh hình, BS Lão khoa/Nội khoa (kiểm soát bệnh nền), BS PHCN và Dinh dưỡng để tối ưu hóa thể trạng trước và sau mổ.", "C. Cách ly bệnh nhân", "D. Cho uống kháng sinh liều cực mạnh"], "c": 1, "e": "Người già gãy xương đùi hiếm khi chết vì gãy xương, mà chết vì đợt cấp suy tim, tiểu đường, loét, viêm phổi... Cần cả ekip quản lý toàn diện."}, {"q": "Câu 36: Để an toàn khi lái xe ô tô sau thay khớp háng, bệnh nhân thường được khuyên chờ bao lâu và cần điều kiện gì?", "a": ["A. Lái ngay ngày hôm sau", "B. Ít nhất 6-8 tuần, khi đã bỏ nạng/gậy, kiểm soát tốt chân phanh/chân ga và không còn dùng thuốc giảm đau gây ngủ", "C. Lái xe sau 1 năm", "D. Lái xe lăn thay ô tô"], "c": 1, "e": "Phản xạ đạp phanh khẩn cấp đòi hỏi sức mạnh và độ linh hoạt của khớp háng. Nếu phản xạ chậm do yếu cơ hoặc thuốc sẽ gây tai nạn giao thông."}, {"q": "Câu 37: Ở bệnh nhân có thay khớp háng nhân tạo, tư thế \"Ngồi xổm\" (Squatting thấp) tiềm ẩn rủi ro gì?", "a": ["A. Tăng cơ bắp đùi", "B. Gây gập háng quá mức (>90 độ) dẫn đến đòn bẩy làm trật chỏm khớp nhân tạo ra khỏi ổ cối", "C. Rách cơ bụng", "D. Chữa táo bón"], "c": 1, "e": "Ở người Việt Nam, thói quen ngồi xổm ăn cơm hoặc dùng hố xí bệt là tối kỵ tuyệt đối và vĩnh viễn đối với người mang khớp háng nhân tạo lối sau."}, {"q": "Câu 38: Khi bệnh nhân nằm nghiêng sang bên không phẫu thuật, KTV PHCN bắt buộc phải làm gì để bảo vệ khớp háng bên mổ (nằm phía trên)?", "a": ["A. Đẩy chân mổ xệ xuống giường", "B. Đặt một hoặc hai gối dày kẹp giữa hai chân để giữ chân mổ nằm ngang hoặc hơi dạng, tránh chân mổ bị rơi khép xuống gây trật khớp", "C. Kéo chân mổ co sát ngực", "D. Nắm cổ chân kéo mạnh"], "c": 1, "e": "Khi nằm nghiêng, trọng lực sẽ kéo chân phía trên rớt khép qua đường giữa cơ thể. Gối dày đóng vai trò làm điểm tỳ đỡ giữ chân luôn ở tư thế dạng an toàn."}, {"q": "Câu 39: Đánh giá ADL (Sinh hoạt hàng ngày) của bệnh nhân sau mổ, hoạt động nào thuộc IADL (Sinh hoạt có sử dụng công cụ) khó phục hồi nhất?", "a": ["A. Xúc cơm ăn", "B. Tự đi chợ, sử dụng phương tiện giao thông công cộng, đi xe máy", "C. Đánh răng", "D. Mặc áo"], "c": 1, "e": "IADL đòi hỏi sự thăng bằng động, di chuyển khoảng cách xa và phản xạ phức tạp, cần thời gian dài PHCN mới đạt được."}, {"q": "Câu 40: \"Tam chứng\" dự phòng tử vong ở bệnh nhân già gãy xương đùi nằm lâu bao gồm những gì?", "a": ["A. Chống sốt, chống ho, chống nôn", "B. Chống viêm phổi do ứ đọng, chống huyết khối tĩnh mạch sâu, chống loét tỳ đè", "C. Chống rụng tóc, chống mờ mắt, chống điếc", "D. Chống ăn nhiều, chống uống nhiều, chống ngủ nhiều"], "c": 1, "e": "Đây là 3 nguyên nhân gây tử vong hàng đầu ở người liệt giường. Vận động trị liệu hô hấp và thể chất sớm là vũ khí duy nhất để phá vỡ tam chứng này."}, {"q": "Câu 41: \"Vận động trị liệu\" (Therapeutic exercise) là phương pháp điều trị như thế nào?", "a": ["A. Dùng máy điện xung để kích thích cơ", "B. Thực hiện các vận động, tư thế hoặc hoạt động cơ thể một cách có hệ thống, kế hoạch nhằm phòng bệnh, chữa bệnh và phục hồi chức năng", "C. Bó bột bất động khớp", "D. Chườm ngải cứu"], "c": 1, "e": "Định nghĩa VĐTL nhấn mạnh việc sử dụng chính chuyển động cơ học của cơ thể (do kỹ thuật viên hoặc tự bệnh nhân làm) như một liều \"thuốc\" điều trị."}, {"q": "Câu 42: Khi thực hiện kỹ thuật VĐTL, nguyên tắc về tư thế của người bệnh là gì?", "a": ["A. Phải đứng thật nghiêm", "B. Phải ở trong tư thế thoải mái, thư giãn tối đa để không có sự gồng cơ chống đối", "C. Phải nằm sấp", "D. Phải ngồi xổm"], "c": 1, "e": "Nếu bệnh nhân đau hoặc tư thế chông chênh, họ sẽ vô thức gồng cứng cơ bảo vệ, làm kỹ thuật viên không thể thực hiện hết tầm vận động."}, {"q": "Câu 43: Trong VĐTL, nguyên tắc \"Ổn định khớp gần\" có ý nghĩa gì?", "a": ["A. Trói bệnh nhân lại", "B. Cố định phần chi thể ở phía gốc (gần trung tâm) để đảm bảo cử động chỉ xảy ra đúng tại khớp cần tập, tránh cử động bù trừ ngoài ý muốn", "C. Khóa chặt khớp lại không cho cử động", "D. Tháo lỏng các khớp"], "c": 1, "e": "Ví dụ muốn tập gập khuỷu, KTV phải giữ chặt cánh tay (ổn định khớp vai) để bệnh nhân không nhấc cả bả vai lên (vận động bù trừ)."}, {"q": "Câu 44: Dấu hiệu nào cho thấy sự tập luyện đã QUÁ MỨC chịu đựng của bệnh nhân?", "a": ["A. Bệnh nhân đổ mồ hôi nhẹ", "B. Bệnh nhân thấy đói", "C. Chứng đau hay khó chịu kéo dài quá 3 giờ, giảm sút lực cơ và tầm vận động khớp vào ngày hôm sau", "D. Bệnh nhân ngủ ngon"], "c": 2, "e": "Đau mỏi nhẹ trong lúc tập là bình thường. Nhưng đau dai dẳng >3h sau tập chứng tỏ mô đã bị tổn thương vi thể (vi chấn thương)."}, {"q": "Câu 45: \"Vận động thụ động\" (Passive Range of Motion - PROM) là loại vận động gì?", "a": ["A. Bệnh nhân tự dùng hết sức để cử động", "B. Cử động được tạo ra hoàn toàn bởi một lực từ bên ngoài (KTV, máy móc, tay lành), cơ của phần chi được tập không hề co rút", "C. Cử động có treo tạ", "D. Vận động trong nước"], "c": 1, "e": "Dùng cho bệnh nhân liệt mềm, hôn mê hoặc sau mổ gân cơ không được phép tự co cơ."}, {"q": "Câu 46: Mục đích chính của Vận động THỤ ĐỘNG là gì?", "a": ["A. Làm cơ to ra (phì đại cơ)", "B. Tăng sức mạnh cơ bắp rõ rệt", "C. Duy trì tầm vận động khớp, phòng ngừa dính khớp/co rút gân cơ, duy trì trí nhớ vận động cảm giác bản thể", "D. Đốt cháy mỡ thừa"], "c": 2, "e": "Vì cơ không co nên thụ động KHÔNG thể làm tăng sức mạnh cơ. Nó chỉ giúp bôi trơn khớp và giữ gân cơ không bị ngắn lại."}, {"q": "Câu 47: Vận động chủ động CÓ TRỢ GIÚP (Active-assisted ROM) áp dụng cho đối tượng nào?", "a": ["A. Cơ khỏe hoàn toàn (Bậc 5)", "B. Bệnh nhân liệt hoàn toàn không nhúc nhích được (Bậc 0)", "C. Cơ yếu (thường Bậc 2), người bệnh có thể tự co cơ nhưng không đủ sức hoàn thành hết tầm vận động, cần ngoại lực hỗ trợ phần còn lại", "D. Bệnh nhân đang ngủ"], "c": 2, "e": "Trợ giúp bằng tay KTV hoặc ròng rọc bù đắp cho phần sức mạnh còn thiếu của cơ, giúp bệnh nhân hoàn thành trọn vẹn cử động."}, {"q": "Câu 48: Khi tập \"Gập - Duỗi cổ chân\" (vị thế nằm ngửa), vị trí tay của Kỹ thuật viên đặt như thế nào là đúng?", "a": ["A. Nắm vào ngón chân kéo mạnh", "B. Một tay giữ ở cổ chân (phía trên mắt cá để cố định cẳng chân), tay còn lại nắm ở bàn/gót chân để thực hiện cử động", "C. Nắm hai tay vào đùi", "D. Cầm cổ chân xoay tròn 360 độ"], "c": 1, "e": "Cố định đầu dưới cẳng chân giúp lực tập trung hoàn toàn vào khớp sên-cẳng chân (cổ chân) khi thực hiện gập lưng/gập lòng."}, {"q": "Câu 49: \"Vận động chủ động tự do\" (Active ROM) được thực hiện khi nào?", "a": ["A. Khi bệnh nhân hôn mê", "B. Người bệnh tự mình thực hiện hết tầm vận động chống lại trọng lực cơ thể mà không cần ai trợ giúp (Cơ bậc 3)", "C. Khi đeo tạ 10kg", "D. Khi người khác cầm tay kéo lên"], "c": 1, "e": "Đây là bước cơ bắp đã phục hồi đủ sức nhấc chi thể lên khỏi mặt giường, tự do di chuyển trong không gian."}, {"q": "Câu 50: Vận động CÓ KHÁNG TRỞ (Resisted exercise) nhằm mục đích lớn nhất là gì?", "a": ["A. Thư giãn khớp", "B. Tăng sức mạnh, sức bền và thể tích của cơ bắp (Phì đại cơ)", "C. Làm mềm dây chằng", "D. Kéo giãn cột sống"], "c": 1, "e": "Chống lại lực cản (tạ, lò xo, tay KTV) làm đứt gãy vi thể sợi cơ, kích thích cơ tổng hợp protein để to lên và mạnh hơn (dành cho cơ Bậc 4, 5)."}, {"q": "Câu 51: Khi tập gập khớp gối (nằm ngửa), KTV cần làm gì?", "a": ["A. Một tay đỡ dưới khoeo, một tay cầm gót chân, vừa gập háng vừa gập gối bệnh nhân", "B. Đè chặt gối xuống giường", "C. Kéo giãn chân thẳng ra", "D. Nắm cổ chân bẻ gập"], "c": 0, "e": "Hỗ trợ dưới khoeo giúp gập gối trơn tru, đồng thời háng gập theo sinh lý tự nhiên của chi dưới."}, {"q": "Câu 52: Để tập cử động DUỖI KHỚP HÁNG (đưa đùi ra sau), tư thế người bệnh nào là thuận lợi nhất?", "a": ["A. Nằm ngửa", "B. Ngồi thõng chân", "C. Nằm sấp hoặc nằm nghiêng", "D. Đứng chụm chân"], "c": 2, "e": "Nằm ngửa bị kẹt bởi mặt giường không thể đưa chân ra sau. Nằm sấp cho phép nâng đùi lên khỏi mặt giường để thực hiện động tác duỗi háng."}, {"q": "Câu 53: Lượng giá hiệu quả của Vận động trị liệu định kỳ thường sử dụng 2 công cụ/thước đo chính nào?", "a": ["A. Cân nặng và chiều cao", "B. Huyết áp và nhịp tim", "C. Thử cơ bằng tay (đánh giá bậc cơ 0-5) và Thước đo góc (đánh giá tầm vận động khớp ROM)", "D. Siêu âm và X-quang"], "c": 2, "e": "Đây là 2 chỉ số lượng giá cốt lõi của VĐTL để biết cơ có mạnh lên không và khớp có mở rộng góc độ ra không."}, {"q": "Câu 54: Tần suất tập luyện nào mang lại hiệu quả tốt hơn cho PHCN?", "a": ["A. Tập 1 lần duy nhất trong tuần, kéo dài 5 tiếng", "B. Tập luyện mỗi ngày nhiều lần, mỗi lần ngắn thời gian (nhưng lặp lại thường xuyên)", "C. 1 tháng tập 1 lần", "D. Tập đến khi kiệt sức không thở được"], "c": 1, "e": "Tập nhiều đợt ngắn trong ngày giúp mô mềm giãn dần đặn, cơ bắp không bị quá tải mệt mỏi và duy trì tưới máu khớp liên tục."}, {"q": "Câu 55: Cử động nào thuộc về khớp vai mà KTV có thể thực hiện khi bệnh nhân nằm ngửa?", "a": ["A. Gập, dạng, xoay trong, xoay ngoài", "B. Chỉ có thể gập", "C. Chỉ có thể xoay trong", "D. Duỗi vai ra sau quá 30 độ"], "c": 0, "e": "Nằm ngửa cho phép thực hiện hầu hết các tầm vận động vai lên trên (gập), ra ngang (dạng) và xoay, trừ động tác duỗi ra sau lưng bị mặt giường cản lại."}, {"q": "Câu 56: Sự khác biệt giữa \"Co cơ đẳng trường\" (Isometric contraction) và \"Co cơ đẳng trương\" (Isotonic contraction) là gì?", "a": ["A. Đẳng trường cơ ngắn lại, đẳng trương cơ dài ra", "B. Đẳng trường (tĩnh): cơ gồng sinh lực nhưng không thay đổi chiều dài, khớp không cử động. Đẳng trương (động): cơ thay đổi chiều dài làm khớp chuyển động.", "C. Đẳng trường dùng máy, đẳng trương dùng tạ", "D. Cả hai đều không sinh lực"], "c": 1, "e": "Isometric (Gồng cơ tĩnh) rất an toàn cho khớp bị đau/sau mổ. Isotonic (Nâng tạ) giúp tập sức mạnh chức năng qua các tầm vận động."}, {"q": "Câu 57: Tại sao khi tập vận động thụ động, KTV phải thực hiện động tác \"trơn tru từ đầu đến cuối tầm vận động\"?", "a": ["A. Để biểu diễn kỹ thuật", "B. Để không làm kích thích các thoi cơ (muscle spindles), tránh gây phản xạ co cứng cơ chống đối lại lực kéo", "C. Để tiết kiệm thời gian", "D. Để bệnh nhân buồn ngủ"], "c": 1, "e": "Chuyển động giật cục, đột ngột sẽ kích hoạt phản xạ tự vệ của tủy sống làm cơ gồng cứng lại, rách vi thể gân cơ."}, {"q": "Câu 58: Động tác \"Nghiêng trong - Nghiêng ngoài\" (Inversion - Eversion) của bàn chân thực chất diễn ra ở khớp nào?", "a": ["A. Khớp sên-cẳng chân (Cổ chân thực sự)", "B. Khớp dưới sên (Subtalar joint) và khớp gian cổ chân", "C. Khớp ngón chân", "D. Khớp gối"], "c": 1, "e": "Khớp sên-cẳng chân chỉ làm động tác gập/duỗi (lên/xuống). Lật bàn chân vào trong/ra ngoài do khớp dưới sên đảm nhiệm."}, {"q": "Câu 59: Khi KTV tập gập-duỗi khớp khuỷu, vị trí cố định (ổn định khớp gần) là ở đâu?", "a": ["A. Cầm chặt bàn tay", "B. Giữ chặt ở 1/3 dưới cánh tay (gần nếp gấp khuỷu) để cố định xương cánh tay", "C. Đè lên bả vai", "D. Kéo ngón tay"], "c": 1, "e": "Giữ phần đầu dưới xương cánh tay đảm bảo toàn bộ lực gập/duỗi chỉ dồn vào bản lề khớp khuỷu, xương cánh tay không bị nhúc nhích."}, {"q": "Câu 60: Trong bài tập Vận động có kháng trở, \"Kháng trở bằng tay của KTV\" (Manual resistance) có ưu điểm gì so với tập bằng tạ/máy?", "a": ["A. KTV bị mệt", "B. Tùy chỉnh được lực cản thay đổi mượt mà theo từng góc độ yếu/mạnh của khớp và theo sát cảm giác đau của bệnh nhân", "C. Lực mạnh hơn máy móc", "D. Không cần kỹ năng"], "c": 1, "e": "Cơ người bệnh có góc mạnh góc yếu. Tạ tĩnh có trọng lượng không đổi, nhưng tay KTV thì linh hoạt giảm lực khi khớp đến đoạn đau/yếu."}, {"q": "Câu 61: Vận động thụ động kéo dài liên tục bằng máy (CPM - Continuous Passive Motion) thường được chỉ định phổ biến nhất sau phẫu thuật nào?", "a": ["A. Mổ viêm ruột thừa", "B. Thay khớp gối nhân tạo hoặc mổ tái tạo dây chằng chéo trước (ACL)", "C. Mổ bắt vít xương sọ", "D. Cắt amidan"], "c": 1, "e": "Máy CPM gập duỗi gối liên tục chậm rãi giúp chống dính khớp, tăng tưới máu sụn khớp và giảm sưng nề sau mổ chấn thương chỉnh hình gối."}, {"q": "Câu 62: Khi tập xoay trong/xoay ngoài khớp vai (nằm ngửa), tư thế khuỷu tay bệnh nhân phải như thế nào để đánh giá đúng?", "a": ["A. Duỗi thẳng tay", "B. Khuỷu gấp 90 độ, cánh tay dạng 90 độ (hoặc áp sát thân)", "C. Gấp tay chạm cằm", "D. Tay vắt chéo ngực"], "c": 1, "e": "Gập khuỷu 90 độ tạo thành một chiếc \"kim chỉ nam\". Khi bàn tay ngã ra sau/ra trước, ta dễ dàng quan sát góc xoay của chỏm xương cánh tay."}, {"q": "Câu 63: Chống chỉ định TƯƠNG ĐỐI của vận động chủ động có kháng trở (Resisted exercise) là gì?", "a": ["A. Cơ bậc 5", "B. Bệnh nhân đang bị viêm khớp cấp tính sưng nóng đỏ đau hoặc gãy xương chưa liền vững", "C. Bệnh nhân cao tuổi", "D. Bệnh nhân thừa cân"], "c": 1, "e": "Lực kháng trở làm tăng ma sát nội khớp và áp lực lên xương. Nếu khớp đang viêm cấp hoặc can xương chưa cứng, tạ sẽ phá hủy cấu trúc."}, {"q": "Câu 64: Mục đích của bài tập \"Kéo giãn\" (Stretching) khác với \"Vận động thụ động\" (PROM) ở điểm nào?", "a": ["A. Cả hai là một", "B. PROM chỉ đi ĐẾN giới hạn tầm vận động hiện có. Stretching dùng lực ÉP QUÁ giới hạn hiện tại để kéo dài mô liên kết bị co rút, tăng thêm tầm vận động", "C. Stretching chỉ dành cho vận động viên", "D. PROM làm đứt gân"], "c": 1, "e": "Thụ động là bảo tồn những gì đang có. Kéo giãn là phá vỡ sự co rút để lấy lại những góc độ đã mất (VD: duỗi thẳng gối bị co rút)."}, {"q": "Câu 65: \"Co cơ ly tâm\" (Eccentric contraction) trong tập sức mạnh có đặc điểm gì?", "a": ["A. Cơ không thay đổi chiều dài", "B. Cơ co sinh lực nhưng hai đầu cơ BỊ KÉO XA NHAU ra (VD: từ từ hạ tạ xuống)", "C. Cơ ngắn lại (VD: cuộn tạ lên)", "D. Cơ liệt hoàn toàn"], "c": 1, "e": "Đây là dạng co cơ hãm tốc (thắng lại lực hút trái đất). Tập ly tâm tạo ra vi chấn thương lớn ở cơ, giúp kích thích phì đại cơ hiệu quả nhất."}, {"q": "Câu 66: Khi tập cử động ngón cái (gập-duỗi), KTV cần lưu ý điều gì đặc biệt so với các ngón khác?", "a": ["A. Bẻ thật mạnh", "B. Ngón cái có khớp hình yên ngựa, hệ thống cơ riêng biệt nên phải được tập riêng độc lập, không gập chung cùng một lúc với 4 ngón kia", "C. Cột ngón cái vào ngón trỏ", "D. Không cần tập ngón cái"], "c": 1, "e": "Ngón cái chiếm 50% chức năng bàn tay (động tác đối ngón). Khớp bàn ngón cái vận động trên bình diện khác hẳn 4 ngón còn lại."}, {"q": "Câu 67: Tư thế KTV khi tập vận động cho người bệnh nằm trên giường cần đảm bảo yếu tố công thái học (ergonomics) nào?", "a": ["A. Đứng xa giường, cúi gập lưng để tập", "B. Đứng sát giường, chân trước chân sau theo chiều cử động, giữ lưng thẳng, dùng lực của toàn thân để di chuyển chi bệnh nhân", "C. Ngồi ghế đẩu", "D. Chồm người qua phía bên kia giường"], "c": 1, "e": "Chân trước chân sau (Lunges) giúp KTV dùng trọng lượng cơ thể (Weight shift) thay vì dùng cơ tay/lưng, phòng ngừa đau thắt lưng nghề nghiệp."}, {"q": "Câu 68: Ở tư thế nằm sấp, KTV một tay đỡ đùi dưới, tay kia đè cố định mông (khung chậu) bệnh nhân xuống giường. Đây là tư thế để tập động tác gì?", "a": ["A. Gập khớp háng", "B. Duỗi khớp háng (Hip extension)", "C. Dạng khớp háng", "D. Gập khớp gối"], "c": 1, "e": "Đè khung chậu để bệnh nhân không ưỡn thắt lưng lên (ăn gian), nâng đùi lên giúp kéo giãn cơ gập háng và tập tầm vận động duỗi sinh lý."}, {"q": "Câu 69: Hiện tượng \"Valsalva maneuver\" (Nín thở rặn) khi bệnh nhân tập tạ nặng gây ra nguy cơ gì?", "a": ["A. Tăng cơ bụng", "B. Tăng vọt áp lực lồng ngực và huyết áp, giảm máu về tim, có thể gây ngất xỉu hoặc tai biến mạch máu ở người cao tuổi/bệnh tim", "C. Tăng lượng oxy vào máu", "D. Giảm đau nhức cơ"], "c": 1, "e": "KTV phải luôn nhắc bệnh nhân \"Hít thở đều, không nín thở\" khi gồng cơ hoặc nâng tạ để tránh hiệu ứng Valsalva chết người này."}, {"q": "Câu 70: Tác dụng toàn thân của Vận động trị liệu đối với hệ tim mạch là gì?", "a": ["A. Làm teo cơ tim", "B. Giảm nhịp tim lúc nghỉ, tăng cung lượng tim, giảm huyết áp tâm trương, cải thiện sức bền tim phổi (khi tập các bài tập Aerobic)", "C. Làm xơ vữa động mạch", "D. Gây nhồi máu cơ tim"], "c": 1, "e": "Các bài tập sức bền (đi bộ, đạp xe) làm tim bơm máu hiệu quả hơn, là cốt lõi của Phục hồi chức năng tim mạch."}, {"q": "Câu 71: Khi tập vận động thụ động khớp vai cho bệnh nhân Liệt nửa người (Đột quỵ) giai đoạn liệt mềm, nguy cơ lớn nhất cần tránh khi thực hiện động tác \"Dạng vai\" là gì?", "a": ["A. Gãy xương sườn", "B. Hội chứng chạm (Impingement) hoặc trật khớp vai ra trước/xuống dưới do KTV không kết hợp xoay ngoài cánh tay và không kiểm soát xương bả vai", "C. Rách cơ ngực lớn", "D. Đứt dây thần kinh quay"], "c": 1, "e": "Chỏm xương tay liệt rất lỏng lẻo. Nếu cứ thế giật cánh tay dạng lên 180 độ mà không xoay ngoài, mấu động lớn sẽ đập nát gân cơ trên gai dưới mỏm cùng vai."}, {"q": "Câu 72: Co cơ đẳng động (Isokinetic exercise) có đặc điểm sinh cơ học gì độc đáo nhất?", "a": ["A. Tốc độ tập không đổi, nhưng sức cản của máy sẽ tự động thay đổi tương ứng với lực phát ra của cơ tại mọi góc độ của tầm vận động", "B. Nâng tạ tự do", "C. Cơ bị liệt hoàn toàn", "D. Vận động dưới nước"], "c": 0, "e": "Máy Isokinetic (như Cybex) là công cụ tối tân. Bệnh nhân đạp mạnh thì máy cản mạnh, đạp yếu máy cản yếu, duy trì một tốc độ (VD: 60 độ/giây). Giúp cơ làm việc tối đa ở mọi góc độ mà cực kỳ an toàn."}, {"q": "Câu 73: Trong nguyên lý \"Động học chuỗi đóng\" (Closed Kinetic Chain - CKC), bài tập Squat có ưu điểm gì so với bài tập đá đùi trên máy (Open Kinetic Chain)?", "a": ["A. CKC chỉ tập 1 cơ duy nhất", "B. Đầu xa chi dưới (bàn chân) cố định trên mặt đất, giúp huy động đồng thời (co cơ đồng vận) cả cơ tứ đầu đùi và cơ chậu-kheo, giảm lực xé xô đẩy lên dây chằng chéo trước (ACL)", "C. Gây đứt dây chằng", "D. Không cần dùng sức"], "c": 1, "e": "Chuỗi đóng an toàn hơn cho khớp vì nó mô phỏng vận động chịu lực thực tế, các cơ đối kháng cùng co lại như một \"cái nẹp sống\" bảo vệ khớp gối."}, {"q": "Câu 74: Khi thực hiện Kéo giãn cơ co rút (Stretching), tại sao kỹ thuật \"Căng - Chùng\" (Hold-Relax / PNF stretching) lại hiệu quả hơn kéo giãn thụ động thông thường?", "a": ["A. Vì nó bẻ gãy gân", "B. Lợi dụng cơ chế \"Ức chế tự thân\" (Autogenic inhibition) từ Cơ quan thụ cảm gân Golgi (GTO). Gồng cơ đẳng trường trước khi kéo giãn sẽ làm GTO kích hoạt phản xạ thư giãn cơ đó, giúp kéo dài hơn mà không đau", "C. Vì dùng máy móc kéo", "D. Vì dùng thuốc tê"], "c": 1, "e": "Khi ta gồng chống lại lực (Hold) trong 5 giây, GTO ở gân nhận tín hiệu căng quá mức sẽ ra lệnh \"tắt điện\" cơ đó đi. Lúc này ta kéo giãn (Relax) cơ sẽ mềm nhũn ra."}, {"q": "Câu 75: Bệnh nhân thay khớp háng lối sau, muốn tập mạnh cơ gập háng (cơ thắt lưng chậu) có kháng trở. Tư thế nào và cử động nào là RỦI RO CẦN TRÁNH?", "a": ["A. Tập gập háng trong khi đùi đang dạng và xoay ngoài", "B. Gập háng đồng thời kết hợp KHÉP đùi quá trục giữa và XOAY TRONG", "C. Nằm ngửa trượt gót", "D. Đứng thẳng chân"], "c": 1, "e": "Gập + Khép + Xoay trong là \"tư thế cấm\" phá vỡ bao khớp sau vừa khâu. Nếu tập kháng trở ở tư thế này, áp lực chỏm khớp ra sau rất lớn sẽ làm trật khớp háng mổ."}, {"q": "Câu 76: Hiện tượng \"Đau nhức cơ bắp khởi phát muộn\" (DOMS - Delayed Onset Muscle Soreness) thường xảy ra mạnh nhất sau loại bài tập nào?", "a": ["A. Bơi lội nhẹ nhàng", "B. Tập co cơ ly tâm cường độ cao (Eccentric exercise - ví dụ chạy xuống dốc, hạ tạ nặng từ từ)", "C. Nằm bất động", "D. Tập thở"], "c": 1, "e": "Co cơ ly tâm bứt rách nhiều sợi z-line và mô liên kết nhất, gây phản ứng viêm cục bộ làm đau nhức đỉnh điểm vào 24-48 giờ sau tập."}, {"q": "Câu 77: Để đánh giá đúng tầm vận động (ROM) của riêng khớp cổ chân (gập mu), tại sao cần đo ở vị thế GẤP KHỚP GỐI thay vì duỗi thẳng gối?", "a": ["A. Tránh bệnh nhân đau lưng", "B. Gập gối làm chùng cơ bụng chân (Gastrocnemius - cơ hai khớp), loại bỏ sức căng của cơ này, giúp đo chính xác độ gập mu của bản thân khớp sên-cẳng chân và cơ dép", "C. Tránh gãy xương chày", "D. Bệnh nhân dễ thở hơn"], "c": 1, "e": "Cơ bụng chân bám từ đùi (qua gối) xuống gót. Nếu duỗi thẳng gối, cơ này bị căng hết cỡ sẽ níu gót lại, hạn chế giả tạo tầm gập cổ chân."}, {"q": "Câu 78: Sự \"Đền bù\" (Compensation) trong vận động trị liệu khớp vai là gì?", "a": ["A. Trả tiền cho kỹ thuật viên", "B. Khi khớp ổ chảo - cánh tay bị cứng (như VQKV đông đặc), bệnh nhân nhún toàn bộ đai vai (xương bả vai) nâng lên để cố gắng đưa tay cao hơn, che giấu sự hạn chế của khớp thực sự", "C. Dùng tay lành làm thay tay liệt", "D. Từ chối tập luyện"], "c": 1, "e": "KTV phải đè chặt xương bả vai (cố định khớp gần) để triệt tiêu cử động bù trừ này, mới ép được khớp vai thực sự vận động."}, {"q": "Câu 79: Bệnh nhân thoái hóa khớp gối nặng, đau khi chịu sức nặng. Loại vận động trị liệu nào TỐI ƯU nhất để duy trì sức mạnh tứ đầu đùi mà không phá hủy thêm sụn khớp?", "a": ["A. Nhảy dây, chạy bộ trên nền cứng", "B. Đạp xe đạp kháng lực thấp, đi bộ dưới nước sâu ngang ngực, hoặc tập gồng cơ đẳng trường chuỗi mở", "C. Tập Squat mang tạ 50kg", "D. Chơi tennis"], "c": 1, "e": "Nước làm giảm 70-80% trọng lượng cơ thể. Đạp xe không bắt gối phải chịu lực tỳ đè toàn thân. Điều này giúp cơ vẫn làm việc mà sụn không bị nghiến nát."}, {"q": "Câu 80: Test \"Thử cơ bằng tay\" (Manual Muscle Testing - MMT) phân biệt Cơ Bậc 2 và Cơ Bậc 3 dựa vào ranh giới sinh lý nào?", "a": ["A. Khả năng chịu lực cản của tay bác sĩ", "B. Khả năng chống lại TRỌNG LỰC: Bậc 2 chỉ cử động được khi loại bỏ trọng lực (trượt trên mặt phẳng); Bậc 3 cử động được hết tầm chống lại trọng lực (nhấc bổng lên không trung)", "C. Tốc độ cử động", "D. Tầm vận động của khớp"], "c": 1, "e": "Trọng lực là rào cản tự nhiên. Nhấc được chi thể rời khỏi mặt giường vươn lên trời là mốc quan trọng đánh dấu cơ đã đạt bậc 3."}];
        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function initJumpSelect() {
            const select = document.getElementById('jump-select');
            quizData.forEach((_, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.text = `Chuyển đến Câu ${idx + 1}`;
                select.appendChild(opt);
            });
        }

        function jumpToQuestion() {
            const select = document.getElementById('jump-select');
            currentIdx = parseInt(select.value);
            loadQuestion();
        }

        function loadQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('q-text').innerText = `Câu ${currentIdx + 1}: ${q.q.replace(/Câu \d+:\s*/, '')}`;
            document.getElementById('question-count').innerText = `Câu ${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            document.getElementById('jump-select').value = currentIdx;
            
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            
            const expBox = document.getElementById('explanation-box');
            expBox.style.display = 'none';
            expBox.innerHTML = '';
            
            answered = false;
            document.getElementById('next-btn').disabled = true;

            q.a.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = () => checkAnswer(div, i);
                list.appendChild(div);
            });
        }

        function checkAnswer(el, idx) {
            if (answered) return;
            answered = true;
            const correctIdx = quizData[currentIdx].c;
            
            if (idx === correctIdx) {
                el.classList.add('correct');
                score++;
            } else {
                el.classList.add('wrong');
                const options = document.querySelectorAll('.option');
                if(options[correctIdx]) {
                    options[correctIdx].classList.add('correct');
                }
            }
            
            // Hiển thị phần giải thích
            const expText = quizData[currentIdx].e;
            if (expText && expText.trim() !== "") {
                const expBox = document.getElementById('explanation-box');
                expBox.innerHTML = `💡 <b>Giải thích:</b><br>${expText}`;
                expBox.style.display = 'block';
            }
            
            document.getElementById('score-display').innerText = `Đúng: ${score}`;
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            const screen = document.getElementById('result-screen');
            screen.style.display = 'block';
            document.getElementById('final-result').innerText = `${score}/${quizData.length}`;
            
            const percent = (score / quizData.length) * 100;
            let msg = "";
            if (percent >= 90) msg = "Quá xuất sắc! Bạn là bậc thầy Phục Hồi Chức Năng.";
            else if (percent >= 70) msg = "Rất tốt! Bạn nắm kiến thức rất vững.";
            else if (percent >= 50) msg = "Tạm ổn, hãy ôn kỹ hơn các phần bị sai nhé.";
            else msg = "Bạn cần cố gắng nhiều hơn để vượt qua môn này.";
            document.getElementById('feedback').innerText = msg;
        }

        if(quizData.length > 0) {
            initJumpSelect();
            loadQuestion();
        } else {
            document.getElementById('q-text').innerText = "Không tìm thấy câu hỏi nào.";
        }
    </script>
</body>
</html>
